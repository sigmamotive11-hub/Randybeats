<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>RANDYBEATS | Premium Instrumentals</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PayPal SDK (your client ID) -->
    <script src="https://www.paypal.com/sdk/js?client-id=AdA9_iV1iAS2sxMJZCT3-Bx1xpdF5U7N2oQalAkZnCjX7BtlAdfpfDl3KHuvW9gQkUeGHoaO0vMcYm11&currency=USD"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ---------- RESET & BASE ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0804;
            color: #f5f0e0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ---------- GOLD CANVAS BACKGROUND (ANIMATED) ---------- */
        #gold-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            display: block;
        }

        /* ---------- GLASS CARD COMPONENT ---------- */
        .glass-card {
            background: rgba(20, 18, 12, 0.75);
            backdrop-filter: blur(14px);
            border-radius: 28px;
            border: 1px solid rgba(212, 175, 55, 0.4);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            border-color: rgba(212, 175, 55, 0.8);
        }

        /* ---------- GOLD BUTTON ---------- */
        .btn-gold {
            background: linear-gradient(135deg, #d4af37, #ffd700);
            color: black;
            font-weight: 700;
            padding: 10px 24px;
            border-radius: 40px;
            display: inline-block;
            cursor: pointer;
            text-align: center;
            border: none;
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn-gold:hover {
            transform: scale(0.98);
            opacity: 0.9;
        }

        /* ---------- BEAT CARD ---------- */
        .beat-card {
            background: rgba(20, 18, 12, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            overflow: hidden;
            transition: 0.3s;
        }

        .beat-card:hover {
            transform: translateY(-6px);
            border-color: #d4af37;
            box-shadow: 0 12px 24px -10px rgba(212, 175, 55, 0.3);
        }

        .cover-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .placeholder-cover {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #2a2418, #1a150c);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        /* ---------- PREVIEW BUTTON & PROGRESS ---------- */
        .preview-btn {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(212, 175, 55, 0.6);
            border-radius: 60px;
            padding: 8px 0;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            text-align: center;
            transition: all 0.2s;
        }

        .preview-btn:hover {
            background: rgba(212, 175, 55, 0.2);
            border-color: #ffd700;
        }

        .preview-btn.playing {
            background: rgba(212, 175, 55, 0.3);
            animation: pulseGlow 1s infinite;
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.5); }
            70% { box-shadow: 0 0 0 8px rgba(212, 175, 55, 0); }
            100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #2a2418;
            margin: 8px 0;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #d4af37, #ffd700);
            width: 0%;
            transition: width 0.1s linear;
        }

        .time-text {
            font-size: 11px;
            font-family: monospace;
            color: #d4af37;
            text-align: right;
        }

        /* ---------- FILTER PANEL ---------- */
        .filter-panel {
            background: rgba(20, 18, 12, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 1.25rem;
            margin-bottom: 2rem;
        }

        input, select {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 40px;
            padding: 10px 16px;
            color: white;
            width: 100%;
            outline: none;
        }

        input:focus, select:focus {
            border-color: #ffd700;
        }

        /* ---------- MODAL STYLES ---------- */
        .modal-overlay {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
        }

        .modal-container {
            background: rgba(20, 18, 12, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid #d4af37;
            max-width: 550px;
            width: 90%;
            padding: 2rem;
        }

        .auth-tab {
            display: inline-block;
            padding: 6px 20px;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.1);
            cursor: pointer;
            margin-right: 8px;
            font-weight: 500;
        }

        .auth-tab.active {
            background: #d4af37;
            color: black;
        }

        /* ---------- UTILITIES ---------- */
        .hidden {
            display: none !important;
        }

        .flex-center {
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <!-- Canvas for gold background -->
    <canvas id="gold-canvas"></canvas>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-5 py-8 relative z-10">
        <!-- Header -->
        <div class="flex justify-between items-center mb-12 flex-wrap gap-4">
            <h1 class="text-4xl md:text-5xl font-extrabold bg-gradient-to-r from-yellow-400 to-amber-500 bg-clip-text text-transparent drop-shadow-lg">RANDYBEATS</h1>
            <div class="space-x-3">
                <a href="#" id="adminLink" class="border border-amber-500 rounded-full px-4 py-2 text-sm hover:bg-amber-500/10 transition">Admin</a>
                <button id="showAccountBtn" class="bg-amber-600/30 border border-amber-500 rounded-full px-4 py-2 text-sm hover:bg-amber-600/50 transition">Sign In</button>
            </div>
        </div>

        <!-- Landing Hero Section -->
        <div class="glass-card p-8 md:p-12 text-center mb-16">
            <h2 class="text-4xl md:text-6xl font-bold mb-4 bg-gradient-to-r from-amber-300 to-yellow-500 bg-clip-text text-transparent">Premium Instrumentals<br>for Artists</h2>
            <p class="text-gray-300 text-lg mb-6 max-w-2xl mx-auto">Instant WAV download · 30‑second previews · Secure checkout with PayPal</p>
            <button id="exploreBtn" class="btn-gold text-lg px-8 py-3">Explore Beats →</button>
        </div>

        <!-- Catalog Section (Beats Grid) -->
        <div id="catalogSection">
            <div class="filter-panel">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
                    <input type="text" id="searchInput" placeholder="Search by title, genre, tags...">
                    <select id="genreFilter">
                        <option value="">All Genres</option>
                        <option value="Trap">Trap</option>
                        <option value="Drill">Drill</option>
                        <option value="RnB">RnB</option>
                        <option value="Lo-fi">Lo-fi</option>
                        <option value="Pop">Pop</option>
                        <option value="Electronic">Electronic</option>
                    </select>
                    <div class="flex gap-2 items-center">
                        <span class="text-sm text-amber-400">BPM:</span>
                        <input type="range" id="bpmMin" min="60" max="180" value="60" class="flex-1">
                        <span id="bpmMinVal" class="text-xs w-8">60</span>
                        <span>-</span>
                        <input type="range" id="bpmMax" min="60" max="180" value="180" class="flex-1">
                        <span id="bpmMaxVal" class="text-xs w-8">180</span>
                    </div>
                    <button id="resetFiltersBtn" class="bg-amber-600/30 border border-amber-500 rounded-full py-2 hover:bg-amber-600/50 transition">Reset</button>
                </div>
            </div>
            <div id="beatsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            <div id="loading" class="text-center py-12 text-amber-400 text-lg">Loading beats...</div>
        </div>
    </div>

    <!-- Beat Detail Modal -->
    <div id="detailModal" class="fixed inset-0 modal-overlay hidden items-center justify-center z-50 p-4">
        <div class="modal-container max-w-2xl w-full">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold text-amber-300">Beat Details</h2>
                <button id="closeDetailModal" class="text-gray-400 text-2xl hover:text-white">&times;</button>
            </div>
            <div id="detailContent"></div>
        </div>
    </div>

    <!-- Account Modal (Login / Signup) -->
    <div id="accountModal" class="fixed inset-0 modal-overlay hidden items-center justify-center z-50 p-4">
        <div class="modal-container">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold text-amber-300">Account Access</h2>
                <button id="closeAccountModal" class="text-gray-400 text-2xl hover:text-white">&times;</button>
            </div>
            <div class="flex gap-2 mb-4 border-b border-gray-700 pb-2">
                <button class="auth-tab active" data-tab="login">Sign In</button>
                <button class="auth-tab" data-tab="signup">Sign Up</button>
            </div>
            <!-- Login Tab -->
            <div id="loginTab">
                <input type="email" id="loginEmail" placeholder="Email address" class="mb-3">
                <input type="password" id="loginPassword" placeholder="Password" class="mb-4">
                <button id="emailLoginBtn" class="btn-gold w-full mb-3">Sign In with Email</button>
                <button id="googleLoginBtn" class="w-full bg-white/10 border border-white/20 py-2 rounded-full mb-2 hover:bg-white/20 transition">Sign In with Google</button>
                <div class="relative my-4">
                    <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-600"></div></div>
                    <div class="relative flex justify-center text-xs"><span class="bg-black/50 px-2">OR</span></div>
                </div>
                <div class="flex gap-2">
                    <input type="tel" id="phoneNumber" placeholder="+1234567890" class="flex-1">
                    <button id="sendOtpBtn" class="bg-amber-600 px-4 rounded-full hover:bg-amber-700 transition">Send OTP</button>
                </div>
                <div id="otpSection" style="display:none;" class="mt-3">
                    <input type="text" id="otpCode" placeholder="6-digit code" class="mb-2">
                    <button id="verifyOtpBtn" class="w-full bg-amber-600 py-2 rounded-full hover:bg-amber-700 transition">Verify & Sign In</button>
                </div>
            </div>
            <!-- Signup Tab -->
            <div id="signupTab" style="display:none;">
                <input type="email" id="signupEmail" placeholder="Email address" class="mb-3">
                <input type="password" id="signupPassword" placeholder="Password (min 6 characters)" class="mb-4">
                <button id="emailSignupBtn" class="btn-gold w-full">Create Account</button>
                <p class="text-xs text-gray-400 text-center mt-3">By signing up you agree to our terms.</p>
            </div>
        </div>
    </div>

    <!-- Checkout Modal (PayPal) -->
    <div id="checkoutModal" class="fixed inset-0 modal-overlay hidden items-center justify-center z-50 p-4">
        <div class="modal-container max-w-md">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold text-amber-300">Checkout</h2>
                <button id="closeCheckoutModal" class="text-gray-400 text-2xl hover:text-white">&times;</button>
            </div>
            <div id="checkoutContent"></div>
        </div>
    </div>

    <script type="module">
        // ---------- FIREBASE IMPORTS ----------
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { 
            getAuth, 
            signInWithPopup, 
            GoogleAuthProvider, 
            createUserWithEmailAndPassword, 
            signInWithEmailAndPassword, 
            RecaptchaVerifier, 
            signInWithPhoneNumber, 
            onAuthStateChanged 
        } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { 
            getFirestore, 
            collection, 
            getDocs, 
            doc, 
            getDoc 
        } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // ---------- FIREBASE CONFIGURATION ----------
        const firebaseConfig = {
            apiKey: "AIzaSyDKeXaVaYtcwnrxYQWUYdZVy7yMdgdK7TQ",
            authDomain: "randybeats-2dfb0.firebaseapp.com",
            projectId: "randybeats-2dfb0",
            storageBucket: "randybeats-2dfb0.firebasestorage.app",
            messagingSenderId: "190194060319",
            appId: "1:190194060319:web:e4ca35186c0c2edbd1d92a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();

        // ---------- GLOBAL VARIABLES ----------
        let beats = [];               // all beats from Firestore
        let filteredBeats = [];      // after filtering
        let activeAudio = null;      // currently playing audio element
        let activeInterval = null;    // progress update interval
        let activeBeatId = null;      // id of currently playing beat
        let currentUser = null;       // Firebase user object
        let selectedBeat = null;      // beat selected for checkout or detail

        // DOM Elements
        const beatsGrid = document.getElementById('beatsGrid');
        const loadingDiv = document.getElementById('loading');
        const detailModal = document.getElementById('detailModal');
        const accountModal = document.getElementById('accountModal');
        const checkoutModal = document.getElementById('checkoutModal');
        const exploreBtn = document.getElementById('exploreBtn');
        const showAccountBtn = document.getElementById('showAccountBtn');
        const adminLink = document.getElementById('adminLink');

        // ---------- NAVIGATION & MODAL HELPERS ----------
        exploreBtn.addEventListener('click', () => {
            document.getElementById('catalogSection').scrollIntoView({ behavior: 'smooth' });
        });

        showAccountBtn.addEventListener('click', () => {
            accountModal.classList.remove('hidden');
            accountModal.classList.add('flex');
        });

        adminLink.addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = 'admin.html';   // your separate admin panel
        });

        // Close modals
        document.getElementById('closeDetailModal').addEventListener('click', () => detailModal.classList.add('hidden'));
        document.getElementById('closeAccountModal').addEventListener('click', () => accountModal.classList.add('hidden'));
        document.getElementById('closeCheckoutModal').addEventListener('click', () => checkoutModal.classList.add('hidden'));

        // ---------- AUTH STATE ----------
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user && !accountModal.classList.contains('hidden')) {
                accountModal.classList.add('hidden');
                // If we had a selected beat waiting after login, proceed to checkout
                if (selectedBeat) {
                    showCheckoutModal(selectedBeat);
                    selectedBeat = null;
                }
            }
        });

        // ---------- ACCOUNT MODAL TABS ----------
        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                const target = tab.dataset.tab;
                document.getElementById('loginTab').style.display = target === 'login' ? 'block' : 'none';
                document.getElementById('signupTab').style.display = target === 'signup' ? 'block' : 'none';
                document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
            });
        });

        // Email Sign Up
        document.getElementById('emailSignupBtn').addEventListener('click', async () => {
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;
            if (!email || !password) return alert('Please fill in all fields');
            try {
                await createUserWithEmailAndPassword(auth, email, password);
                alert('Account created successfully! You are now signed in.');
                accountModal.classList.add('hidden');
            } catch (err) {
                alert(err.message);
            }
        });

        // Email Sign In
        document.getElementById('emailLoginBtn').addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            if (!email || !password) return alert('Enter email and password');
            try {
                await signInWithEmailAndPassword(auth, email, password);
                accountModal.classList.add('hidden');
            } catch (err) {
                alert(err.message);
            }
        });

        // Google Sign In
        document.getElementById('googleLoginBtn').addEventListener('click', async () => {
            try {
                await signInWithPopup(auth, googleProvider);
                accountModal.classList.add('hidden');
            } catch (err) {
                alert(err.message);
            }
        });

        // Phone OTP Authentication
        let recaptchaVerifier = null;
        let confirmationResult = null;

        function setupRecaptcha() {
            if (!recaptchaVerifier) {
                recaptchaVerifier = new RecaptchaVerifier(auth, 'sendOtpBtn', {
                    size: 'invisible',
                    callback: () => {}
                });
            }
            recaptchaVerifier.render();
        }

        document.getElementById('sendOtpBtn').addEventListener('click', async () => {
            const phoneNumber = document.getElementById('phoneNumber').value.trim();
            if (!phoneNumber) return alert('Enter phone number with country code (e.g., +1234567890)');
            setupRecaptcha();
            try {
                confirmationResult = await signInWithPhoneNumber(auth, phoneNumber, recaptchaVerifier);
                document.getElementById('otpSection').style.display = 'block';
                alert('OTP sent!');
            } catch (err) {
                alert(err.message);
            }
        });

        document.getElementById('verifyOtpBtn').addEventListener('click', async () => {
            const otp = document.getElementById('otpCode').value.trim();
            if (!otp || !confirmationResult) return alert('Enter the 6-digit code');
            try {
                await confirmationResult.confirm(otp);
                accountModal.classList.add('hidden');
                alert('Phone verified and signed in!');
            } catch (err) {
                alert('Invalid OTP');
            }
        });

        // ---------- FETCH BEATS FROM FIRESTORE ----------
        async function loadBeats() {
            try {
                const beatsCollection = collection(db, 'beats');
                const snapshot = await getDocs(beatsCollection);
                beats = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                applyFilters();
            } catch (err) {
                loadingDiv.innerHTML = '⚠️ Error loading beats: ' + err.message;
                console.error(err);
            }
        }

        // ---------- FILTERING LOGIC ----------
        function applyFilters() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const genreValue = document.getElementById('genreFilter').value;
            const bpmMin = parseInt(document.getElementById('bpmMin').value, 10);
            const bpmMax = parseInt(document.getElementById('bpmMax').value, 10);

            filteredBeats = beats.filter(beat => {
                // Genre filter
                if (genreValue && beat.genre !== genreValue) return false;
                // BPM filter
                const bpm = parseInt(beat.bpm, 10);
                if (bpm < bpmMin || bpm > bpmMax) return false;
                // Search (title, genre, tags)
                if (searchTerm) {
                    const titleMatch = beat.title.toLowerCase().includes(searchTerm);
                    const genreMatch = beat.genre && beat.genre.toLowerCase().includes(searchTerm);
                    const tagsMatch = beat.tags && beat.tags.toLowerCase().includes(searchTerm);
                    if (!titleMatch && !genreMatch && !tagsMatch) return false;
                }
                return true;
            });
            renderCatalog();
        }

        // ---------- RENDER CATALOG (BEAT CARDS) ----------
        function renderCatalog() {
            loadingDiv.style.display = 'none';
            if (!filteredBeats.length) {
                beatsGrid.innerHTML = '<div class="col-span-full text-center py-12 text-amber-400">✨ No beats match your filters. Try adjusting search or genre.</div>';
                return;
            }

            beatsGrid.innerHTML = filteredBeats.map(beat => `
                <div class="beat-card p-4">
                    ${beat.coverArt 
                        ? `<img src="${beat.coverArt}" class="cover-img rounded-xl mb-3" onerror="this.src='https://placehold.co/600x400/2a2418/white?text=🎵'">` 
                        : `<div class="placeholder-cover rounded-xl mb-3">🎧</div>`
                    }
                    <div class="flex justify-between items-start gap-2">
                        <div>
                            <h3 class="font-bold text-lg text-amber-100">${escapeHtml(beat.title)}</h3>
                            <p class="text-sm text-amber-400">${escapeHtml(beat.genre)} • ${beat.bpm} BPM</p>
                            ${beat.tags ? `<p class="text-xs text-gray-400 mt-1">${escapeHtml(beat.tags)}</p>` : ''}
                        </div>
                        <span class="text-2xl font-bold text-yellow-400">$${beat.price}</span>
                    </div>
                    <button class="preview-btn w-full mt-3" data-id="${beat.id}" data-url="${beat.audioUrl}">▶ 30s Preview</button>
                    <div class="progress-bar"><div id="progress-${beat.id}" class="progress-fill"></div></div>
                    <div id="time-${beat.id}" class="time-text">0:00 / 0:30</div>
                    <div class="flex gap-2 mt-3">
                        <button class="detail-btn flex-1 bg-amber-600/20 border border-amber-500 rounded-full py-1 text-sm hover:bg-amber-600/30 transition" data-beat='${JSON.stringify(beat)}'>Details</button>
                        <button class="buy-btn flex-1 bg-gradient-to-r from-amber-600 to-yellow-600 text-black font-bold rounded-full py-1 text-sm hover:opacity-90 transition" data-beat='${JSON.stringify(beat)}'>Buy Now</button>
                    </div>
                </div>
            `).join('');

            // Attach event listeners after rendering
            attachPreviewEvents();
            attachDetailEvents();
            attachBuyEvents();
        }

        // ---------- PREVIEW LOGIC (30s limit, progress bar, stop on end) ----------
        function attachPreviewEvents() {
            document.querySelectorAll('.preview-btn').forEach(btn => {
                btn.removeEventListener('click', previewClickHandler);
                btn.addEventListener('click', previewClickHandler);
            });
        }

        function previewClickHandler(e) {
            const btn = e.currentTarget;
            const beatId = btn.dataset.id;
            const audioUrl = btn.dataset.url;
            togglePreview(beatId, audioUrl);
        }

        function togglePreview(beatId, audioUrl) {
            // Stop if same beat is already playing
            if (activeBeatId === beatId && activeAudio && !activeAudio.paused) {
                stopPreview();
                return;
            }
            stopPreview();

            const btn = document.querySelector(`.preview-btn[data-id="${beatId}"]`);
            const progressFill = document.getElementById(`progress-${beatId}`);
            const timeDisplay = document.getElementById(`time-${beatId}`);
            if (!btn || !progressFill || !timeDisplay) return;

            btn.disabled = true;
            btn.innerHTML = '⏳ Loading...';

            const audio = new Audio();
            audio.src = audioUrl;
            audio.crossOrigin = "Anonymous";
            audio._beatId = beatId;

            let maxDuration = 30;
            let interval = null;

            audio.addEventListener('loadedmetadata', () => {
                maxDuration = Math.min(audio.duration, 30);
                audio.currentTime = 0;
                audio.play().then(() => {
                    btn.innerHTML = '⏸ Pause';
                    btn.disabled = false;
                    btn.classList.add('playing');
                    activeAudio = audio;
                    activeBeatId = beatId;

                    interval = setInterval(() => {
                        if (audio.paused) {
                            clearInterval(interval);
                            resetPreviewButton(btn, progressFill, timeDisplay);
                            return;
                        }
                        if (audio.currentTime >= maxDuration) {
                            audio.pause();
                            audio.currentTime = 0;
                            clearInterval(interval);
                            resetPreviewButton(btn, progressFill, timeDisplay);
                        } else {
                            const percent = (audio.currentTime / maxDuration) * 100;
                            progressFill.style.width = percent + '%';
                            const currentSec = Math.floor(audio.currentTime);
                            timeDisplay.textContent = `${Math.floor(currentSec/60)}:${(currentSec%60).toString().padStart(2,'0')} / 0:${Math.floor(maxDuration)}`;
                        }
                    }, 200);
                }).catch(err => {
                    console.error('Playback error:', err);
                    resetPreviewButton(btn, progressFill, timeDisplay);
                    const errorDiv = document.getElementById(`error-${beatId}`);
                    if (errorDiv) errorDiv.textContent = '❌ Cannot play audio.';
                });
            });

            audio.onerror = () => {
                resetPreviewButton(btn, progressFill, timeDisplay);
                console.error('Audio load error');
            };

            function resetPreviewButton(btnEl, prog, time) {
                btnEl.innerHTML = '▶ 30s Preview';
                btnEl.disabled = false;
                btnEl.classList.remove('playing');
                prog.style.width = '0%';
                time.textContent = '0:00 / 0:30';
                activeAudio = null;
                activeBeatId = null;
                if (interval) clearInterval(interval);
            }
        }

        function stopPreview() {
            if (activeAudio) {
                activeAudio.pause();
                activeAudio.currentTime = 0;
                if (activeInterval) clearInterval(activeInterval);
                const oldBtn = document.querySelector(`.preview-btn[data-id="${activeBeatId}"]`);
                if (oldBtn) {
                    oldBtn.innerHTML = '▶ 30s Preview';
                    oldBtn.classList.remove('playing');
                }
                const oldProgress = document.getElementById(`progress-${activeBeatId}`);
                if (oldProgress) oldProgress.style.width = '0%';
                const oldTime = document.getElementById(`time-${activeBeatId}`);
                if (oldTime) oldTime.textContent = '0:00 / 0:30';
                activeAudio = null;
                activeBeatId = null;
            }
        }

        // ---------- DETAIL MODAL ----------
        function attachDetailEvents() {
            document.querySelectorAll('.detail-btn').forEach(btn => {
                btn.removeEventListener('click', detailClickHandler);
                btn.addEventListener('click', detailClickHandler);
            });
        }

        function detailClickHandler(e) {
            const beat = JSON.parse(e.currentTarget.dataset.beat);
            showDetailModal(beat);
        }

        function showDetailModal(beat) {
            const contentDiv = document.getElementById('detailContent');
            contentDiv.innerHTML = `
                <div class="flex flex-col md:flex-row gap-6">
                    <div class="md:w-1/2">
                        ${beat.coverArt 
                            ? `<img src="${beat.coverArt}" class="w-full rounded-2xl border border-amber-500" onerror="this.src='https://placehold.co/600x600/2a2418/white?text=🎵'">` 
                            : `<div class="w-full aspect-square bg-gray-800 rounded-2xl flex items-center justify-center text-5xl">🎧</div>`
                        }
                    </div>
                    <div class="md:w-1/2">
                        <h3 class="text-2xl font-bold text-amber-100">${escapeHtml(beat.title)}</h3>
                        <p class="text-amber-400 mt-1">${escapeHtml(beat.genre)} • ${beat.bpm} BPM</p>
                        <p class="text-3xl font-bold text-yellow-400 mt-3">$${beat.price}</p>
                        ${beat.tags ? `<p class="text-gray-300 mt-4"><span class="text-amber-400">Tags:</span> ${escapeHtml(beat.tags)}</p>` : ''}
                        <button id="detailBuyNowBtn" class="btn-gold w-full mt-6">Buy Now</button>
                    </div>
                </div>
            `;
            detailModal.classList.remove('hidden');
            detailModal.classList.add('flex');
            document.getElementById('detailBuyNowBtn').addEventListener('click', () => {
                detailModal.classList.add('hidden');
                if (!currentUser) {
                    selectedBeat = beat;
                    accountModal.classList.remove('hidden');
                    accountModal.classList.add('flex');
                } else {
                    showCheckoutModal(beat);
                }
            });
        }

        // ---------- BUY BUTTON & CHECKOUT MODAL ----------
        function attachBuyEvents() {
            document.querySelectorAll('.buy-btn').forEach(btn => {
                btn.removeEventListener('click', buyClickHandler);
                btn.addEventListener('click', buyClickHandler);
            });
        }

        function buyClickHandler(e) {
            const beat = JSON.parse(e.currentTarget.dataset.beat);
            if (!currentUser) {
                selectedBeat = beat;
                accountModal.classList.remove('hidden');
                accountModal.classList.add('flex');
            } else {
                showCheckoutModal(beat);
            }
        }

        function showCheckoutModal(beat) {
            const container = document.getElementById('checkoutContent');
            container.innerHTML = `
                <div class="text-center">
                    <p class="text-xl font-semibold">${escapeHtml(beat.title)}</p>
                    <p class="text-3xl font-bold text-yellow-400 my-3">$${beat.price}</p>
                    <div id="paypal-button-container"></div>
                    <p class="text-xs text-gray-400 mt-4">We will send the full WAV file to <strong>${currentUser.email}</strong> immediately after payment.</p>
                </div>
            `;
            checkoutModal.classList.remove('hidden');
            checkoutModal.classList.add('flex');

            if (window.paypal) {
                paypal.Buttons({
                    createOrder: (data, actions) => {
                        return actions.order.create({
                            purchase_units: [{
                                amount: { value: beat.price, currency: "USD" },
                                description: beat.title
                            }]
                        });
                    },
                    onApprove: (data, actions) => {
                        return actions.order.capture().then(details => {
                            alert(`✅ Purchase complete! Beat "${beat.title}" will be sent to ${currentUser.email}. Thank you!`);
                            checkoutModal.classList.add('hidden');
                            // Here you could record the purchase in Firestore or send an email
                        });
                    },
                    onError: (err) => {
                        console.error(err);
                        alert('Payment error. Please try again.');
                    }
                }).render('#paypal-button-container');
            } else {
                container.innerHTML += '<p class="text-red-400 mt-3">PayPal SDK failed to load. Refresh the page.</p>';
            }
        }

        // ---------- FILTER EVENT LISTENERS ----------
        document.getElementById('searchInput').addEventListener('input', applyFilters);
        document.getElementById('genreFilter').addEventListener('change', applyFilters);
        document.getElementById('bpmMin').addEventListener('input', (e) => {
            document.getElementById('bpmMinVal').innerText = e.target.value;
            applyFilters();
        });
        document.getElementById('bpmMax').addEventListener('input', (e) => {
            document.getElementById('bpmMaxVal').innerText = e.target.value;
            applyFilters();
        });
        document.getElementById('resetFiltersBtn').addEventListener('click', () => {
            document.getElementById('searchInput').value = '';
            document.getElementById('genreFilter').value = '';
            document.getElementById('bpmMin').value = '60';
            document.getElementById('bpmMax').value = '180';
            document.getElementById('bpmMinVal').innerText = '60';
            document.getElementById('bpmMaxVal').innerText = '180';
            applyFilters();
        });

        // ---------- HELPER: ESCAPE HTML ----------
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m]);
        }

        // ---------- GOLD CANVAS BACKGROUND (ANIMATED) ----------
        const canvas = document.getElementById('gold-canvas');
        const ctx = canvas.getContext('2d');
        let canvasWidth, canvasHeight;
        let goldBars = [];
        let particles = [];
        let mouseX = 0, mouseY = 0, targetMouseX = 0, targetMouseY = 0;

        function resizeCanvas() {
            canvasWidth = window.innerWidth;
            canvasHeight = window.innerHeight;
            canvas.width = canvasWidth;
            canvas.height = canvasHeight;
        }

        window.addEventListener('resize', () => {
            resizeCanvas();
            initGoldBars();
            initParticles();
        });

        window.addEventListener('mousemove', (e) => {
            targetMouseX = e.clientX;
            targetMouseY = e.clientY;
            mouseX = mouseX * 0.95 + targetMouseX * 0.05;
            mouseY = mouseY * 0.95 + targetMouseY * 0.05;
        });

        class GoldBar {
            constructor() {
                this.x = Math.random() * canvasWidth;
                this.y = Math.random() * canvasHeight;
                this.w = Math.random() * 60 + 30;
                this.h = Math.random() * 15 + 8;
                this.angle = Math.random() * Math.PI * 2;
                this.rotSpeed = (Math.random() - 0.5) * 0.005;
                this.moveX = (Math.random() - 0.5) * 0.3;
                this.moveY = (Math.random() - 0.5) * 0.2;
                this.opacity = Math.random() * 0.25 + 0.1;
            }
            update() {
                // Mouse repulsion
                const dx = this.x - mouseX;
                const dy = this.y - mouseY;
                const dist = Math.hypot(dx, dy);
                if (dist < 120) {
                    const angle = Math.atan2(dy, dx);
                    const force = (120 - dist) / 120 * 0.8;
                    this.x += Math.cos(angle) * force;
                    this.y += Math.sin(angle) * force;
                }
                this.x += this.moveX;
                this.y += this.moveY;
                this.angle += this.rotSpeed;
                // Wrap around
                if (this.x < -100) this.x = canvasWidth + 100;
                if (this.x > canvasWidth + 100) this.x = -100;
                if (this.y < -100) this.y = canvasHeight + 100;
                if (this.y > canvasHeight + 100) this.y = -100;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                const grad = ctx.createLinearGradient(-this.w/2, -this.h/2, this.w/2, this.h/2);
                grad.addColorStop(0, `rgba(212, 175, 55, ${this.opacity * 0.8})`);
                grad.addColorStop(0.5, `rgba(255, 215, 0, ${this.opacity})`);
                grad.addColorStop(1, `rgba(184, 134, 11, ${this.opacity * 0.7})`);
                ctx.fillStyle = grad;
                ctx.shadowBlur = 12;
                ctx.shadowColor = `rgba(212, 175, 55, ${this.opacity * 0.6})`;
                ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h);
                ctx.strokeStyle = `rgba(255, 235, 140, ${this.opacity * 0.8})`;
                ctx.lineWidth = 1;
                ctx.strokeRect(-this.w/2, -this.h/2, this.w, this.h);
                ctx.restore();
            }
        }

        class GoldParticle {
            constructor() {
                this.x = Math.random() * canvasWidth;
                this.y = Math.random() * canvasHeight;
                this.size = Math.random() * 2 + 0.8;
                this.speedX = (Math.random() - 0.5) * 0.2;
                this.speedY = (Math.random() - 0.5) * 0.15;
                this.alpha = Math.random() * 0.4 + 0.15;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0) this.x = canvasWidth;
                if (this.x > canvasWidth) this.x = 0;
                if (this.y < 0) this.y = canvasHeight;
                if (this.y > canvasHeight) this.y = 0;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 215, 0, ${this.alpha})`;
                ctx.fill();
            }
        }

        function initGoldBars() {
            goldBars = [];
            const barCount = Math.min(35, Math.floor(canvasWidth / 80));
            for (let i = 0; i < barCount; i++) goldBars.push(new GoldBar());
        }

        function initParticles() {
            particles = [];
            const particleCount = Math.min(200, Math.floor(canvasWidth * canvasHeight / 12000));
            for (let i = 0; i < particleCount; i++) particles.push(new GoldParticle());
        }

        function drawBackgroundGradient() {
            const grad = ctx.createLinearGradient(0, 0, canvasWidth, canvasHeight);
            grad.addColorStop(0, '#0a0804');
            grad.addColorStop(0.5, '#1c160c');
            grad.addColorStop(1, '#0d0a05');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvasWidth, canvasHeight);
            const radGrad = ctx.createRadialGradient(canvasWidth/2, canvasHeight/2, 50, canvasWidth/2, canvasHeight/2, canvasWidth/1.2);
            radGrad.addColorStop(0, 'rgba(212, 175, 55, 0.05)');
            radGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = radGrad;
            ctx.fillRect(0, 0, canvasWidth, canvasHeight);
        }

        function animateCanvas() {
            if (!ctx) return;
            drawBackgroundGradient();
            for (let bar of goldBars) {
                bar.update();
                bar.draw();
            }
            for (let p of particles) {
                p.update();
                p.draw();
            }
            requestAnimationFrame(animateCanvas);
        }

        function startCanvas() {
            resizeCanvas();
            initGoldBars();
            initParticles();
            animateCanvas();
        }

        startCanvas();

        // ---------- INITIAL LOAD ----------
        loadBeats();
    </script>
</body>
</html>
