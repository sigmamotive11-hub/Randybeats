<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RANDYBEATS | GLITCH WAVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.paypal.com/sdk/js?client-id=AdA9_iV1iAS2sxMJZCT3-Bx1xpdF5U7N2oQalAkZnCjX7BtlAdfpfDl3KHuvW9gQkUeGHoaO0vMcYm11&currency=USD"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Major+Mono+Display&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #010103;
            font-family: 'Space Grotesk', sans-serif;
            color: #eef;
            overflow-x: hidden;
            position: relative;
        }
        /* scanline grid + noise */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(0deg, rgba(0,255,255,0.03) 0px, rgba(0,255,255,0.03) 1px, transparent 1px, transparent 2px),
                repeating-linear-gradient(90deg, rgba(255,0,255,0.03) 0px, rgba(255,0,255,0.03) 1px, transparent 1px, transparent 2px);
            pointer-events: none;
            z-index: 0;
        }
        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-radial-gradient(circle at 20% 30%, rgba(0,0,0,0), rgba(0,0,0,0.2) 2px);
            pointer-events: none;
            z-index: 1;
            opacity: 0.3;
            mix-blend-mode: overlay;
        }
        /* glitch text animation */
        @keyframes glitch {
            0% { text-shadow: -2px 0 #ff00c1, 2px 0 #00e0ff; transform: skew(0deg); }
            2% { text-shadow: 2px 0 #ff00c1, -2px 0 #00e0ff; transform: skew(2deg); }
            4% { text-shadow: -2px 0 #ff00c1, 2px 0 #00e0ff; transform: skew(0deg); }
            100% { text-shadow: -2px 0 #ff00c1, 2px 0 #00e0ff; transform: skew(0deg); }
        }
        .glitch-text {
            animation: glitch 4s infinite;
        }
        /* brutalist card – sharp edges */
        .beat-card {
            background: rgba(8, 8, 16, 0.85);
            border: 1px solid #ff00c1;
            box-shadow: 8px 8px 0 rgba(0, 224, 255, 0.3);
            transition: all 0.15s linear;
            overflow: hidden;
            position: relative;
            backdrop-filter: blur(2px);
        }
        .beat-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 12px 12px 0 rgba(0, 224, 255, 0.6);
            border-color: #00e0ff;
        }
        /* glitch hover effect on cover */
        .cover-img {
            width: 100%;
            height: 210px;
            object-fit: cover;
            filter: grayscale(20%) contrast(120%);
            transition: 0.1s;
        }
        .beat-card:hover .cover-img {
            filter: grayscale(0%) contrast(140%);
            transform: scale(1.01);
        }
        .placeholder-cover {
            width: 100%;
            height: 210px;
            background: repeating-linear-gradient(45deg, #1a0a2a, #1a0a2a 20px, #2a1040 20px, #2a1040 40px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }
        /* interactive preview button – retro wave */
        .preview-btn {
            background: #010103;
            border: 1px solid #ff00c1;
            color: #ff66cc;
            font-weight: 700;
            font-size: 0.9rem;
            padding: 10px 0;
            width: 100%;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.1s linear;
            position: relative;
            font-family: 'Major Mono Display', monospace;
        }
        .preview-btn:hover {
            background: #ff00c1;
            color: #010103;
            border-color: #00e0ff;
            box-shadow: 0 0 8px #ff00c1;
        }
        .preview-btn.playing {
            background: #00e0ff;
            color: #010103;
            border-color: #ff00c1;
            animation: flicker 0.8s infinite;
        }
        @keyframes flicker {
            0% { opacity: 1; text-shadow: none; }
            50% { opacity: 0.8; text-shadow: 0 0 2px #fff; }
            100% { opacity: 1; text-shadow: none; }
        }
        /* waveform bars while playing */
        .waveform {
            display: flex;
            justify-content: center;
            gap: 3px;
            margin-top: 6px;
            height: 24px;
        }
        .wave-bar {
            width: 4px;
            background: #ff00c1;
            border-radius: 0;
            transition: height 0.05s linear;
        }
        .playing ~ .waveform .wave-bar {
            background: #00e0ff;
        }
        .progress-bar {
            width: 100%;
            height: 3px;
            background: #2a1a3a;
            margin: 8px 0 4px;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #ff00c1;
            transition: width 0.05s linear;
        }
        .time-text {
            font-family: 'Major Mono Display', monospace;
            font-size: 10px;
            text-align: right;
            color: #b0b;
        }
        .error-msg {
            font-size: 10px;
            color: #f66;
            text-align: center;
            margin-top: 6px;
        }
        .price {
            font-family: 'Major Mono Display', monospace;
            font-size: 1.8rem;
            font-weight: 700;
            color: #ff66cc;
            text-shadow: 0 0 4px #ff00c1;
            letter-spacing: -1px;
        }
        .genre-badge {
            background: #010103;
            border: 1px solid #00e0ff;
            padding: 2px 8px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #0ff;
            text-transform: uppercase;
        }
        .admin-btn {
            border: 1px solid #ff00c1;
            background: #010103;
            padding: 6px 16px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #ff66cc;
            transition: 0.1s;
            display: inline-block;
        }
        .admin-btn:hover {
            background: #ff00c1;
            color: #000;
            border-color: #00e0ff;
            box-shadow: 0 0 6px #ff00c1;
        }
        /* asymmetric grid offset */
        .beat-card:nth-child(odd) {
            transform: translateY(8px);
        }
        .beat-card:nth-child(even) {
            transform: translateY(-4px);
        }
        .beat-card:hover {
            transform: translate(0px, 0px) !important;
        }
    </style>
</head>
<body>
<div class="grid-bg"></div>
<div class="noise"></div>

<div class="max-w-7xl mx-auto px-5 py-8 relative z-20">
    <div class="flex justify-between items-center mb-14 flex-wrap gap-4 border-b border-ff00c1 pb-4">
        <div>
            <h1 class="text-6xl md:text-7xl font-black glitch-text" style="font-family: 'Major Mono Display', monospace; letter-spacing: -2px;">
                RANDY<span class="text-cyan-400">BEATS</span>
            </h1>
            <p class="text-xs text-gray-400 mt-2 tracking-widest">// GLITCH WAVE PREMIUM //</p>
        </div>
        <a href="admin.html" class="admin-btn">[ ADMIN ]</a>
    </div>

    <div id="beatsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    <div id="loading" class="text-center text-gray-500 py-24 font-mono">>_ LOADING BEATS...</div>
</div>

<script>
    const JSONBIN_BIN_ID = "69d9031f36566621a89b8120";
    const JSONBIN_API_KEY = "$2a$10$1vAYpinavkrFzHw.xa5ao..1RKHqR9.Pb0cx4ngmXwteD5kTG.dmG";

    let activeAudio = null;
    let activeInterval = null;
    let activeBeatId = null;
    let waveInterval = null;

    async function loadBeats() {
        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
                headers: { 'X-Master-Key': JSONBIN_API_KEY }
            });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            const beats = data.record || [];
            renderStore(beats);
        } catch (err) {
            document.getElementById('loading').innerHTML = '>_ ERROR: ' + err.message;
        }
    }

    function renderStore(beats) {
        const grid = document.getElementById('beatsGrid');
        const loadingDiv = document.getElementById('loading');
        loadingDiv.style.display = 'none';
        if (!beats.length) {
            grid.innerHTML = '<div class="col-span-full text-center text-gray-500 py-16">>_ NO BEATS FOUND. USE ADMIN PANEL.</div>';
            return;
        }
        grid.innerHTML = beats.map(beat => `
            <div class="beat-card">
                ${beat.coverArt ? `<img src="${beat.coverArt}" class="cover-img" onerror="this.src='https://placehold.co/600x400/1a0a2a/cyan?text=🎵'">` : `<div class="placeholder-cover">⚡</div>`}
                <div class="p-5">
                    <div class="flex justify-between items-start gap-2">
                        <div>
                            <h3 class="text-xl font-bold tracking-tight">${escapeHtml(beat.title)}</h3>
                            <div class="flex items-center gap-2 mt-2">
                                <span class="genre-badge">${escapeHtml(beat.genre)}</span>
                                <span class="text-xs text-cyan-300">${beat.bpm} BPM</span>
                            </div>
                        </div>
                        <span class="price">$${beat.price}</span>
                    </div>
                    <div class="mt-5">
                        <button class="preview-btn" data-id="${beat.id}" data-url="${beat.audioUrl}">▶ 30s PREVIEW</button>
                        <div class="waveform" id="wave-${beat.id}" style="display: none;">
                            ${Array(12).fill().map(() => '<div class="wave-bar" style="height: 8px;"></div>').join('')}
                        </div>
                        <div class="progress-bar"><div id="progress-${beat.id}" class="progress-fill"></div></div>
                        <div id="time-${beat.id}" class="time-text">0:00 / 0:30</div>
                        <div id="error-${beat.id}" class="error-msg hidden"></div>
                    </div>
                    <div id="paypal-${beat.id}" class="mt-5"></div>
                </div>
            </div>
        `).join('');

        document.querySelectorAll('.preview-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = btn.getAttribute('data-id');
                const url = btn.getAttribute('data-url');
                togglePreview(id, url);
            });
        });

        beats.forEach(beat => {
            if (window.paypal) {
                paypal.Buttons({
                    createOrder: (data, actions) => actions.order.create({
                        purchase_units: [{ amount: { value: beat.price, currency: "USD" }, description: beat.title }]
                    }),
                    onApprove: () => alert("✅ Purchase complete! Full WAV will be sent.")
                }).render(`#paypal-${beat.id}`);
            }
        });
    }

    function togglePreview(beatId, audioUrl) {
        if (activeBeatId === beatId && activeAudio && !activeAudio.paused) {
            stopPreview();
            return;
        }
        stopPreview();

        const btn = document.querySelector(`.preview-btn[data-id="${beatId}"]`);
        const progressFill = document.getElementById(`progress-${beatId}`);
        const timeDisplay = document.getElementById(`time-${beatId}`);
        const errorDiv = document.getElementById(`error-${beatId}`);
        const waveformDiv = document.getElementById(`wave-${beatId}`);

        btn.innerHTML = '⏳ LOADING...';
        btn.disabled = true;
        errorDiv.classList.add('hidden');
        if (waveformDiv) waveformDiv.style.display = 'flex';

        const audio = new Audio();
        audio.src = audioUrl;
        audio.crossOrigin = "Anonymous";

        let maxDuration = 30;
        let interval = null;
        let waveIntervalId = null;

        // animate waveform randomly
        function animateWaveform() {
            const bars = waveformDiv?.querySelectorAll('.wave-bar');
            if (!bars || !audio || audio.paused) return;
            bars.forEach(bar => {
                const newHeight = 6 + Math.random() * 20;
                bar.style.height = newHeight + 'px';
            });
        }

        audio.addEventListener('loadedmetadata', () => {
            maxDuration = Math.min(audio.duration, 30);
            audio.currentTime = 0;
            audio.play().then(() => {
                btn.innerHTML = '⏸ PAUSE';
                btn.disabled = false;
                btn.classList.add('playing');
                activeAudio = audio;
                activeBeatId = beatId;

                if (waveformDiv) waveIntervalId = setInterval(animateWaveform, 120);
                interval = setInterval(() => {
                    if (audio.paused) {
                        clearInterval(interval);
                        if (waveIntervalId) clearInterval(waveIntervalId);
                        btn.innerHTML = '▶ 30s PREVIEW';
                        btn.classList.remove('playing');
                        progressFill.style.width = '0%';
                        timeDisplay.textContent = '0:00 / 0:30';
                        if (waveformDiv) waveformDiv.style.display = 'none';
                        activeAudio = null;
                        activeBeatId = null;
                        return;
                    }
                    if (audio.currentTime >= maxDuration) {
                        audio.pause();
                        audio.currentTime = 0;
                        clearInterval(interval);
                        if (waveIntervalId) clearInterval(waveIntervalId);
                        btn.innerHTML = '▶ 30s PREVIEW';
                        btn.classList.remove('playing');
                        progressFill.style.width = '0%';
                        timeDisplay.textContent = '0:00 / 0:30';
                        if (waveformDiv) waveformDiv.style.display = 'none';
                        activeAudio = null;
                        activeBeatId = null;
                    } else {
                        const percent = (audio.currentTime / maxDuration) * 100;
                        progressFill.style.width = percent + '%';
                        const currentSec = Math.floor(audio.currentTime);
                        timeDisplay.textContent = `${Math.floor(currentSec/60)}:${(currentSec%60).toString().padStart(2,'0')} / 0:${Math.floor(maxDuration)}`;
                    }
                }, 200);
            }).catch(err => {
                btn.innerHTML = '▶ 30s PREVIEW';
                btn.disabled = false;
                errorDiv.textContent = '❌ PLAY FAILED: CORS OR INVALID URL';
                errorDiv.classList.remove('hidden');
                if (waveformDiv) waveformDiv.style.display = 'none';
            });
        });

        audio.onerror = () => {
            btn.innerHTML = '▶ 30s PREVIEW';
            btn.disabled = false;
            errorDiv.textContent = '❌ AUDIO ERROR: CHECK URL';
            errorDiv.classList.remove('hidden');
            if (waveformDiv) waveformDiv.style.display = 'none';
        };
    }

    function stopPreview() {
        if (activeAudio) {
            activeAudio.pause();
            activeAudio.currentTime = 0;
            if (activeInterval) clearInterval(activeInterval);
            if (waveInterval) clearInterval(waveInterval);
            const oldBtn = document.querySelector(`.preview-btn[data-id="${activeBeatId}"]`);
            if (oldBtn) {
                oldBtn.innerHTML = '▶ 30s PREVIEW';
                oldBtn.classList.remove('playing');
            }
            const oldProgress = document.getElementById(`progress-${activeBeatId}`);
            if (oldProgress) oldProgress.style.width = '0%';
            const oldTime = document.getElementById(`time-${activeBeatId}`);
            if (oldTime) oldTime.textContent = '0:00 / 0:30';
            const oldWave = document.getElementById(`wave-${activeBeatId}`);
            if (oldWave) oldWave.style.display = 'none';
            activeAudio = null;
            activeBeatId = null;
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }

    loadBeats();
</script>
</body>
</html>
