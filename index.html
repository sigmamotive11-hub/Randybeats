        body {

            background: linear-gradient(145deg, #0c0a1a 0%, #030014 100%);
            color: #f0f0f0;
            min-height: 100vh;
        }

        /* Animated grain texture */
        .grain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-repeat: repeat;
        }

        /* Floating orbs */
        .orb {
            position: fixed;
            width: 50vw;
            height: 50vw;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.4;
        }
        .orb-1 {
            background: radial-gradient(circle, #a855f7, #d946ef);
            top: -20vh;
            right: -10vw;
            animation: float1 20s infinite alternate;
        }
        .orb-2 {
            background: radial-gradient(circle, #06b6d4, #3b82f6);
            bottom: -30vh;
            left: -10vw;
            animation: float2 25s infinite alternate;
        }
        @keyframes float1 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(5%, 5%) scale(1.2); }
        }
        @keyframes float2 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-5%, -5%) scale(1.3); }
        }

        /* Glass card */
        .beat-card {
            background: rgba(20, 18, 35, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            overflow: hidden;
            box-shadow: 0 20px 35px -15px rgba(0, 0, 0, 0.5);
        }
        .beat-card:hover {
            transform: translateY(-8px) scale(1.01);
            border-color: rgba(168, 85, 247, 0.4);
            box-shadow: 0 25px 40px -15px rgba(168, 85, 247, 0.3);
        }
        .cover-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .beat-card:hover .cover-img {
            transform: scale(1.03);
        }
        .placeholder-cover {
            width: 100%;
            height: 220px;
            background: linear-gradient(135deg, #2a1e3c, #1a1028);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
        }

        /* Interactive preview button */
        .preview-btn {
            background: rgba(30, 27, 50, 0.8);
            border: 1px solid rgba(168, 85, 247, 0.5);
            border-radius: 40px;
            padding: 10px 0;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.25s;
            cursor: pointer;
            width: 100%;
            color: #e2e8ff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            backdrop-filter: blur(4px);
        }
        .preview-btn:hover {
            background: rgba(168, 85, 247, 0.2);
            border-color: #a855f7;
            color: white;
            transform: scale(0.98);
        }
        .preview-btn.playing {
            background: rgba(168, 85, 247, 0.35);
            border-color: #f0a;
            color: white;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(168, 85, 247, 0.5); }
            70% { box-shadow: 0 0 0 8px rgba(168, 85, 247, 0); }
            100% { box-shadow: 0 0 0 0 rgba(168, 85, 247, 0); }
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #2a2a3a;
            border-radius: 4px;
            margin: 12px 0 6px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #a855f7, #ec4899);
            width: 0%;
            transition: width 0.1s linear;
        }

            text-align: right;
        }

            color: #f87171;
            text-align: center;
            margin-top: 8px;
