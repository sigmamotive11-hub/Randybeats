<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>RANDYBEATS | Sunken Gold</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.paypal.com/sdk/js?client-id=AdA9_iV1iAS2sxMJZCT3-Bx1xpdF5U7N2oQalAkZnCjX7BtlAdfpfDl3KHuvW9gQkUeGHoaO0vMcYm11&currency=USD"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            color: #eef5ff;
            min-height: 100vh;
            overflow-x: hidden;
            background: #021a2a;
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            display: block;
        }
        /* Glass cards with deep ocean & gold accents */
        .beat-card {
            background: rgba(5, 25, 35, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            border: 1px solid rgba(212, 175, 55, 0.4);
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            overflow: hidden;
            box-shadow: 0 20px 35px -15px rgba(0, 0, 0, 0.6);
        }
        .beat-card:hover {
            transform: translateY(-8px);
            border-color: #ffd700;
            box-shadow: 0 25px 40px -15px rgba(212, 175, 55, 0.4);
        }
        .cover-img {
            width: 100%;
            height: 210px;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .beat-card:hover .cover-img {
            transform: scale(1.03);
        }
        .placeholder-cover {
            width: 100%;
            height: 210px;
            background: linear-gradient(135deg, #0a2a3a, #041a2a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }
        .preview-btn {
            background: rgba(0, 20, 30, 0.6);
            border: 1px solid rgba(212, 175, 55, 0.6);
            border-radius: 60px;
            padding: 10px 0;
            font-weight: 700;
            font-size: 0.9rem;
            transition: all 0.25s;
            cursor: pointer;
            width: 100%;
            color: #ffecb3;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            backdrop-filter: blur(4px);
        }
        .preview-btn:hover {
            background: rgba(212, 175, 55, 0.2);
            border-color: #ffd700;
            color: white;
            transform: scale(0.98);
        }
        .preview-btn.playing {
            background: rgba(212, 175, 55, 0.3);
            border-color: #ffd700;
            animation: pulseGold 1s infinite;
        }
        @keyframes pulseGold {
            0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.5); }
            70% { box-shadow: 0 0 0 8px rgba(212, 175, 55, 0); }
            100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #1a3a4a;
            border-radius: 4px;
            margin: 12px 0 6px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #d4af37, #ffd700);
            width: 0%;
            transition: width 0.1s linear;
        }
        .time-text {
            font-size: 11px;
            font-family: monospace;
            color: #ffd966;
            text-align: right;
        }
        .error-msg {
            font-size: 11px;
            color: #ff8888;
            text-align: center;
            margin-top: 8px;
        }
        .price {
            background: linear-gradient(135deg, #ffd700, #b8860b);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            font-weight: 800;
            font-size: 1.8rem;
            letter-spacing: -0.02em;
            text-shadow: 0 0 8px rgba(255,215,0,0.3);
        }
        .genre-badge {
            background: rgba(212, 175, 55, 0.2);
            border-radius: 30px;
            padding: 3px 12px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #ffd966;
            border: 0.5px solid rgba(212,175,55,0.4);
        }
        .admin-btn {
            background: rgba(5, 30, 40, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(212, 175, 55, 0.5);
            transition: 0.2s;
            border-radius: 40px;
            padding: 8px 20px;
            font-weight: 500;
            color: #ffecb3;
        }
        .admin-btn:hover {
            background: rgba(212, 175, 55, 0.2);
            border-color: #ffd700;
            color: white;
        }
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #0a2a3a;
        }
        ::-webkit-scrollbar-thumb {
            background: #d4af37;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <canvas id="ocean-canvas"></canvas>

    <div class="max-w-7xl mx-auto px-5 py-8 relative z-10">
        <div class="flex justify-between items-center mb-14 flex-wrap gap-4">
            <div>
                <h1 class="text-5xl md:text-6xl font-extrabold tracking-tight">
                    <span class="bg-gradient-to-r from-yellow-400 to-amber-500 bg-clip-text text-transparent drop-shadow-lg">RANDYBEATS</span>
                </h1>
                <p class="text-cyan-200/70 text-sm mt-1">sunken gold · deep wav</p>
            </div>
            <a href="admin.html" class="admin-btn text-sm transition">🔐 Admin Panel</a>
        </div>

        <div id="beatsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        <div id="loading" class="text-center text-cyan-300/60 py-24 text-lg">Loading beats...</div>
    </div>

    <script>
        // ==================== 3D GOLD BARS + OCEAN BACKGROUND ====================
        const canvas = document.getElementById('ocean-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let goldBars = [];
        let bubbles = [];
        let caustics = [];
        let mouseX = 0, mouseY = 0;
        let targetX = 0, targetY = 0;
        let time = 0;

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        window.addEventListener('resize', () => {
            resizeCanvas();
            initGoldBars();
            initBubbles();
        });

        window.addEventListener('mousemove', (e) => {
            targetX = e.clientX;
            targetY = e.clientY;
            mouseX = mouseX * 0.95 + targetX * 0.05;
            mouseY = mouseY * 0.95 + targetY * 0.05;
        });

        // 3D Gold Bar with pseudo-3D shading (isometric-like bevel)
        class GoldBar3D {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.w = Math.random() * 70 + 40;   // width
                this.h = Math.random() * 18 + 10;    // height
                this.angle = Math.random() * Math.PI * 2;
                this.rotSpeed = (Math.random() - 0.5) * 0.003;
                this.moveX = (Math.random() - 0.5) * 0.2;
                this.moveY = (Math.random() - 0.5) * 0.15;
                this.depth = Math.random() * 0.7 + 0.3; // z-depth for shading
                this.opacity = Math.random() * 0.4 + 0.2;
            }
            update() {
                // mouse repulsion (like water currents)
                const dx = this.x - mouseX;
                const dy = this.y - mouseY;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < 150) {
                    const angle = Math.atan2(dy, dx);
                    const force = (150 - dist) / 150 * 0.6;
                    this.x += Math.cos(angle) * force;
                    this.y += Math.sin(angle) * force;
                }
                this.x += this.moveX;
                this.y += this.moveY;
                this.angle += this.rotSpeed;
                // wrap around edges with padding
                if (this.x < -100) this.x = width + 100;
                if (this.x > width + 100) this.x = -100;
                if (this.y < -100) this.y = height + 100;
                if (this.y > height + 100) this.y = -100;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                // draw 3D effect: top face (lighter), side face (darker)
                const w2 = this.w / 2;
                const h2 = this.h / 2;
                const bevel = 4;
                // main body (base)
                const gradBody = ctx.createLinearGradient(-w2, -h2, w2, h2);
                gradBody.addColorStop(0, `rgba(212, 175, 55, ${this.opacity * 0.9})`);
                gradBody.addColorStop(0.5, `rgba(255, 215, 0, ${this.opacity})`);
                gradBody.addColorStop(1, `rgba(184, 134, 11, ${this.opacity * 0.8})`);
                ctx.fillStyle = gradBody;
                ctx.shadowBlur = 12;
                ctx.shadowColor = `rgba(0, 100, 120, 0.5)`;
                ctx.fillRect(-w2, -h2, this.w, this.h);
                // top highlight (3D bevel)
                ctx.beginPath();
                ctx.moveTo(-w2, -h2);
                ctx.lineTo(w2, -h2);
                ctx.lineTo(w2 - bevel, -h2 + bevel);
                ctx.lineTo(-w2 + bevel, -h2 + bevel);
                ctx.closePath();
                ctx.fillStyle = `rgba(255, 245, 180, ${this.opacity * 0.6})`;
                ctx.fill();
                // right side shadow
                ctx.beginPath();
                ctx.moveTo(w2, -h2);
                ctx.lineTo(w2, h2);
                ctx.lineTo(w2 - bevel, h2 - bevel);
                ctx.lineTo(w2 - bevel, -h2 + bevel);
                ctx.closePath();
                ctx.fillStyle = `rgba(100, 70, 20, ${this.opacity * 0.5})`;
                ctx.fill();
                // bottom edge shine
                ctx.strokeStyle = `rgba(255, 235, 140, ${this.opacity * 0.7})`;
                ctx.lineWidth = 1.2;
                ctx.strokeRect(-w2, -h2, this.w, this.h);
                ctx.restore();
            }
        }

        class Bubble {
            constructor() {
                this.x = Math.random() * width;
                this.y = height + Math.random() * 100;
                this.radius = Math.random() * 5 + 2;
                this.speedY = -(Math.random() * 0.8 + 0.4);
                this.opacity = Math.random() * 0.3 + 0.1;
            }
            update() {
                this.y += this.speedY;
                if (this.y < -20) {
                    this.y = height + 20;
                    this.x = Math.random() * width;
                }
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(200, 230, 255, ${this.opacity})`;
                ctx.fill();
                ctx.strokeStyle = `rgba(255, 255, 255, 0.3)`;
                ctx.lineWidth = 0.5;
                ctx.stroke();
                // highlight
                ctx.beginPath();
                ctx.arc(this.x - this.radius*0.3, this.y - this.radius*0.3, this.radius*0.2, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, 0.5)`;
                ctx.fill();
            }
        }

        function initGoldBars() {
            goldBars = [];
            const barCount = Math.min(25, Math.floor(width / 100));
            for (let i = 0; i < barCount; i++) {
                goldBars.push(new GoldBar3D());
            }
        }

        function initBubbles() {
            bubbles = [];
            const bubbleCount = Math.min(80, Math.floor(width * height / 15000));
            for (let i = 0; i < bubbleCount; i++) {
                bubbles.push(new Bubble());
            }
        }

        // Draw ocean gradient + caustic light rays
        function drawOceanBackground() {
            // deep ocean gradient
            const grad = ctx.createLinearGradient(0, 0, 0, height);
            grad.addColorStop(0, '#021a2a');
            grad.addColorStop(0.4, '#043a4a');
            grad.addColorStop(0.8, '#062a3a');
            grad.addColorStop(1, '#011520');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, height);

            // caustic light rays (sinusoidal patterns)
            time += 0.008;
            for (let i = 0; i < 12; i++) {
                const xOffset = i * 120 + time * 30;
                const alpha = 0.08 + Math.sin(time + i) * 0.04;
                ctx.beginPath();
                for (let y = 0; y < height; y += 15) {
                    const x = width/2 + Math.sin(y * 0.02 + xOffset) * 60 + Math.cos(y * 0.01 + time) * 30;
                    ctx.lineTo(x, y);
                }
                ctx.strokeStyle = `rgba(100, 200, 220, ${alpha})`;
                ctx.lineWidth = 2;
                ctx.stroke();
            }
            // additional light rays from top corners
            for (let i = 0; i < 5; i++) {
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(width * (i/5), 0);
                ctx.lineTo(width * (i/5 + 0.1), height);
                ctx.closePath();
                ctx.fillStyle = `rgba(80, 180, 200, 0.03)`;
                ctx.fill();
            }
        }

        function animate() {
            if (!ctx) return;
            drawOceanBackground();
            for (let bar of goldBars) {
                bar.update();
                bar.draw();
            }
            for (let bubble of bubbles) {
                bubble.update();
                bubble.draw();
            }
            requestAnimationFrame(animate);
        }

        function startCanvas() {
            resizeCanvas();
            initGoldBars();
            initBubbles();
            animate();
        }

        startCanvas();

        // ==================== BEAT STORE LOGIC (preserved) ====================
        const JSONBIN_BIN_ID = "69d9031f36566621a89b8120";
        const JSONBIN_API_KEY = "$2a$10$1vAYpinavkrFzHw.xa5ao..1RKHqR9.Pb0cx4ngmXwteD5kTG.dmG";

        let activeAudio = null;
        let activeInterval = null;
        let activeBeatId = null;

        async function loadBeats() {
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': JSONBIN_API_KEY }
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                const beats = data.record || [];
                renderStore(beats);
            } catch (err) {
                document.getElementById('loading').innerHTML = 'Failed to load beats.<br>' + err.message;
            }
        }

        function renderStore(beats) {
            const grid = document.getElementById('beatsGrid');
            const loadingDiv = document.getElementById('loading');
            loadingDiv.style.display = 'none';
            if (!beats.length) {
                grid.innerHTML = '<div class="col-span-full text-center text-cyan-300/60 py-16">✨ No beats yet — add some in the admin panel.</div>';
                return;
            }
            grid.innerHTML = beats.map(beat => `
                <div class="beat-card">
                    ${beat.coverArt ? `<img src="${beat.coverArt}" class="cover-img" onerror="this.src='https://placehold.co/600x400/0a2a3a/white?text=🎵'">` : `<div class="placeholder-cover">🎧</div>`}
                    <div class="p-5">
                        <div class="flex justify-between items-start gap-3">
                            <div>
                                <h3 class="text-xl font-bold tracking-tight text-cyan-50">${escapeHtml(beat.title)}</h3>
                                <div class="flex items-center gap-2 mt-2">
                                    <span class="genre-badge">${escapeHtml(beat.genre)}</span>
                                    <span class="text-sm text-cyan-300 font-medium">${beat.bpm} BPM</span>
                                </div>
                            </div>
                            <span class="price">$${beat.price}</span>
                        </div>
                        <div class="mt-5">
                            <button class="preview-btn" data-id="${beat.id}" data-url="${beat.audioUrl}">
                                <span class="play-icon">▶</span> 30s Preview
                            </button>
                            <div class="progress-bar"><div id="progress-${beat.id}" class="progress-fill"></div></div>
                            <div id="time-${beat.id}" class="time-text">0:00 / 0:30</div>
                            <div id="error-${beat.id}" class="error-msg hidden"></div>
                        </div>
                        <div id="paypal-${beat.id}" class="mt-5"></div>
                    </div>
                </div>
            `).join('');

            document.querySelectorAll('.preview-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const id = btn.getAttribute('data-id');
                    const url = btn.getAttribute('data-url');
                    togglePreview(id, url);
                });
            });

            beats.forEach(beat => {
                if (window.paypal) {
                    paypal.Buttons({
                        createOrder: (data, actions) => actions.order.create({
                            purchase_units: [{ amount: { value: beat.price, currency: "USD" }, description: beat.title }]
                        }),
                        onApprove: () => alert("✅ Purchase complete! You'll receive the full WAV download link via email.")
                    }).render(`#paypal-${beat.id}`);
                }
            });
        }

        function togglePreview(beatId, audioUrl) {
            if (activeBeatId === beatId && activeAudio && !activeAudio.paused) {
                stopPreview();
                return;
            }
            stopPreview();

            const btn = document.querySelector(`.preview-btn[data-id="${beatId}"]`);
            const progressFill = document.getElementById(`progress-${beatId}`);
            const timeDisplay = document.getElementById(`time-${beatId}`);
            const errorDiv = document.getElementById(`error-${beatId}`);

            btn.innerHTML = '<span>⏳</span> Loading...';
            btn.disabled = true;
            errorDiv.classList.add('hidden');

            const audio = new Audio();
            audio.src = audioUrl;
            audio.crossOrigin = "Anonymous";

            let maxDuration = 30;
            let interval = null;

            audio.addEventListener('loadedmetadata', () => {
                maxDuration = Math.min(audio.duration, 30);
                audio.currentTime = 0;
                audio.play().then(() => {
                    btn.innerHTML = '<span>⏸</span> Pause';
                    btn.disabled = false;
                    btn.classList.add('playing');
                    activeAudio = audio;
                    activeBeatId = beatId;

                    interval = setInterval(() => {
                        if (audio.paused) {
                            clearInterval(interval);
                            btn.innerHTML = '<span>▶</span> 30s Preview';
                            btn.classList.remove('playing');
                            progressFill.style.width = '0%';
                            timeDisplay.textContent = '0:00 / 0:30';
                            activeAudio = null;
                            activeBeatId = null;
                            return;
                        }
                        if (audio.currentTime >= maxDuration) {
                            audio.pause();
                            audio.currentTime = 0;
                            clearInterval(interval);
                            btn.innerHTML = '<span>▶</span> 30s Preview';
                            btn.classList.remove('playing');
                            progressFill.style.width = '0%';
                            timeDisplay.textContent = '0:00 / 0:30';
                            activeAudio = null;
                            activeBeatId = null;
                        } else {
                            const percent = (audio.currentTime / maxDuration) * 100;
                            progressFill.style.width = percent + '%';
                            const currentSec = Math.floor(audio.currentTime);
                            timeDisplay.textContent = `${Math.floor(currentSec/60)}:${(currentSec%60).toString().padStart(2,'0')} / 0:${Math.floor(maxDuration)}`;
                        }
                    }, 200);
                }).catch(err => {
                    btn.innerHTML = '<span>▶</span> 30s Preview';
                    btn.disabled = false;
                    errorDiv.textContent = '❌ Cannot play audio. Check URL or CORS.';
                    errorDiv.classList.remove('hidden');
                });
            });

            audio.onerror = () => {
                btn.innerHTML = '<span>▶</span> 30s Preview';
                btn.disabled = false;
                errorDiv.textContent = '❌ Failed to load audio. Invalid URL or CORS.';
                errorDiv.classList.remove('hidden');
            };
        }

        function stopPreview() {
            if (activeAudio) {
                activeAudio.pause();
                activeAudio.currentTime = 0;
                if (activeInterval) clearInterval(activeInterval);
                const oldBtn = document.querySelector(`.preview-btn[data-id="${activeBeatId}"]`);
                if (oldBtn) {
                    oldBtn.innerHTML = '<span>▶</span> 30s Preview';
                    oldBtn.classList.remove('playing');
                }
                const oldProgress = document.getElementById(`progress-${activeBeatId}`);
                if (oldProgress) oldProgress.style.width = '0%';
                const oldTime = document.getElementById(`time-${activeBeatId}`);
                if (oldTime) oldTime.textContent = '0:00 / 0:30';
                activeAudio = null;
                activeBeatId = null;
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
        }

        loadBeats();
    </script>
</body>
</html>
