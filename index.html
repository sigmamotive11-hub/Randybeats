<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>RANDYBEATS | Premium Instrumentals</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.paypal.com/sdk/js?client-id=AdA9_iV1iAS2sxMJZCT3-Bx1xpdF5U7N2oQalAkZnCjX7BtlAdfpfDl3KHuvW9gQkUeGHoaO0vMcYm11&currency=USD"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0B0C10; color: #E0E0E0; }
        .glass-card { background: rgba(18,22,35,0.7); backdrop-filter: blur(14px); border: 1px solid rgba(0,229,255,0.2); border-radius: 28px; transition: all 0.3s; }
        .glass-card:hover { border-color: #00E5FF; transform: translateY(-6px); }
        .btn-primary { background: linear-gradient(105deg, #00E5FF, #B026FF); }
        .upload-zone { border: 2px dashed rgba(0,229,255,0.4); border-radius: 20px; background: rgba(0,229,255,0.02); cursor: pointer; }
        .cover-img { object-fit: cover; width: 100%; height: 200px; border-radius: 20px; }
        audio { width: 100%; border-radius: 60px; background: #1A1E2A; }
        .wave-group { display: flex; gap: 3px; height: 32px; justify-content: center; }
        .wave-bar { width: 3px; background: linear-gradient(to top, #00E5FF, #B026FF); border-radius: 2px; }
    </style>
</head>
<body>

<nav class="fixed top-0 w-full z-50 bg-black/40 backdrop-blur-xl border-b border-white/10">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-cyan-400 to-purple-600 flex items-center justify-center">R</div>
            <h1 class="text-2xl font-bold bg-gradient-to-r from-cyan-300 via-purple-400 to-pink-400 bg-clip-text text-transparent">RANDYBEATS</h1>
        </div>
        <button onclick="openAdminModal()" class="px-5 py-2 rounded-full border border-cyan-500/50 text-cyan-300 hover:bg-cyan-500/10">🔐 ADMIN</button>
    </div>
</nav>

<section class="pt-32 pb-16 text-center">
    <div class="max-w-4xl mx-auto">
        <h2 class="text-5xl md:text-7xl font-bold bg-gradient-to-r from-white via-cyan-300 to-purple-400 bg-clip-text text-transparent">Premium Instrumentals</h2>
        <p class="text-gray-300 mt-4">Instant delivery · Unlimited license</p>
        <div class="flex justify-center gap-6 mt-8 text-cyan-300">
            <span id="beatCount">0</span> Beats Available
        </div>
    </div>
</section>

<main class="max-w-7xl mx-auto px-6 pb-20">
    <div id="beatsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    <div id="emptyState" class="hidden text-center py-20 glass-card p-12">No beats yet. Add via admin.</div>
</main>

<!-- ADMIN MODAL -->
<div id="adminModal" class="fixed inset-0 z-50 hidden items-center justify-center p-4 bg-black/70 backdrop-blur-md">
    <div class="w-full max-w-2xl rounded-3xl bg-black/90 border border-cyan-500/30 p-6">
        <div id="loginScreen">
            <h3 class="text-2xl font-bold text-center mb-4">Admin Access</h3>
            <input type="password" id="adminPassInput" class="w-full bg-black/50 border border-cyan-500/30 rounded-xl p-3 text-white">
            <button onclick="verifyAdmin()" class="w-full mt-4 btn-primary text-white font-bold py-3 rounded-xl">UNLOCK</button>
        </div>
        <div id="adminPanel" class="hidden">
            <div class="flex justify-between items-center border-b border-white/10 pb-3 mb-4">
                <h3 class="text-2xl font-bold text-cyan-300">Beat Studio</h3>
                <button onclick="closeAdminModal()" class="text-gray-400 text-2xl">&times;</button>
            </div>
            <form id="beatForm" class="space-y-4">
                <input type="text" id="beatTitle" placeholder="Beat Title" class="w-full bg-black/40 border border-purple-500/40 rounded-xl p-3 text-white">
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="beatGenre" placeholder="Genre">
                    <input type="number" id="beatBpm" placeholder="BPM">
                </div>
                <input type="number" id="beatPrice" placeholder="Price USD" step="0.01" class="w-full bg-black/40 rounded-xl p-3">
                
                <!-- AUDIO FILENAME (not URL) -->
                <div>
                    <label class="text-xs text-gray-400">Audio filename in B2 bucket (e.g., beat123.mp3)</label>
                    <input type="text" id="beatAudioFilename" placeholder="filename.mp3" class="w-full bg-black/40 border border-cyan-500/30 rounded-xl p-3 text-white">
                    <p class="text-[10px] text-gray-500 mt-1">File must already exist in your 'randybeats' bucket.</p>
                </div>

                <!-- COVER UPLOAD (optional) -->
                <div>
                    <label class="text-xs text-gray-400">Cover art (optional)</label>
                    <div id="coverUploadZone" class="upload-zone p-3 text-center">
                        <input type="file" id="coverFileInput" accept="image/*" class="hidden">
                        <div id="coverZoneContent">📸 Click to upload cover</div>
                    </div>
                    <div id="coverStatus" class="text-xs mt-1"></div>
                </div>
                <input type="hidden" id="beatId">
                <input type="hidden" id="beatCoverUrl">
                <button type="submit" class="w-full btn-primary text-black font-bold py-3 rounded-xl">💾 SAVE BEAT</button>
            </form>
            <div class="mt-6">
                <h4 class="text-sm font-mono text-cyan-400">Current Beats</h4>
                <div id="adminBeatList" class="space-y-2 max-h-64 overflow-y-auto mt-2"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // ========== YOUR BACKBLAZE CREDENTIALS (EMBEDDED) ==========
    const B2_KEY_ID = "003b1181fb58a820000000001";
    const B2_APP_KEY = "K003c3cZuuAr6jFDR5+HG8256evJbao";
    const B2_BUCKET_NAME = "randybeats";
    const B2_ENDPOINT = "https://s3.eu-central-003.backblazeb2.com";
    const B2_PUBLIC_URL_BASE = `${B2_ENDPOINT}/${B2_BUCKET_NAME}`;

    const ADMIN_PASSWORD = "Z7@qL9!vR2#pXr8$T4^mK6&cN1*HsW3";

    let beats = JSON.parse(localStorage.getItem('randybeats_data') || '[]');
    let b2AuthToken = null;
    let b2ApiUrl = null;
    let b2DownloadAuthToken = null; // for signed URLs

    // Authenticate with B2 using your keys
    async function b2Authenticate() {
        const credentials = btoa(`${B2_KEY_ID}:${B2_APP_KEY}`);
        const res = await fetch('https://api.backblazeb2.com/b2api/v2/b2_authorize_account', {
            headers: { 'Authorization': `Basic ${credentials}` }
        });
        if (!res.ok) throw new Error('B2 auth failed');
        const data = await res.json();
        b2AuthToken = data.authorizationToken;
        b2ApiUrl = data.apiUrl;
        return data;
    }

    // Get a download authorization (signed URL) for a specific file
    async function getSignedAudioUrl(fileName) {
        try {
            if (!b2AuthToken) await b2Authenticate();
            const res = await fetch(`${b2ApiUrl}/b2api/v2/b2_get_download_authorization`, {
                method: 'POST',
                headers: { 'Authorization': b2AuthToken, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    bucketId: (await b2Authenticate()).allowed.bucketId,
                    fileNamePrefix: fileName,
                    validDurationInSeconds: 86400 // 24 hours
                })
            });
            if (!res.ok) throw new Error('Failed to get download auth');
            const data = await res.json();
            const downloadUrl = `${B2_PUBLIC_URL_BASE}/${fileName}?Authorization=${data.authorizationToken}`;
            return downloadUrl;
        } catch (err) {
            console.error("Signed URL error:", err);
            // Fallback to public URL (if bucket is public)
            return `${B2_PUBLIC_URL_BASE}/${fileName}`;
        }
    }

    // Render store with signed audio URLs
    async function renderStore() {
        const container = document.getElementById('beatsGrid');
        const emptyDiv = document.getElementById('emptyState');
        if (!beats.length) {
            container.innerHTML = '';
            emptyDiv.classList.remove('hidden');
            document.getElementById('beatCount').innerText = '0';
            return;
        }
        emptyDiv.classList.add('hidden');
        document.getElementById('beatCount').innerText = beats.length;

        // Generate signed URLs for all beats (async)
        for (let beat of beats) {
            if (beat.audioFilename && !beat._signedUrl) {
                try {
                    beat._signedUrl = await getSignedAudioUrl(beat.audioFilename);
                } catch(e) { beat._signedUrl = null; }
            }
        }

        container.innerHTML = beats.map(beat => `
            <div class="glass-card p-5 beat-card">
                ${beat.coverArt ? `<img src="${beat.coverArt}" class="cover-img mb-4" onerror="this.src='https://placehold.co/400x200/1a1a2e/cyan?text=🎵'">` : `<div class="h-48 rounded-2xl bg-gray-800 flex items-center justify-center mb-4 text-4xl">🎧</div>`}
                <div class="flex justify-between">
                    <div><h3 class="text-xl font-bold">${escapeHtml(beat.title)}</h3><p class="text-cyan-300 text-sm">${beat.genre} • ${beat.bpm} BPM</p></div>
                    <span class="text-2xl font-bold text-pink-400">$${beat.price}</span>
                </div>
                <div class="wave-group my-3" id="wave-${beat.id}">${Array(6).fill().map(() => `<div class="wave-bar" style="height: ${12+Math.random()*18}px"></div>`).join('')}</div>
                <audio id="audio-${beat.id}" controls class="w-full my-2" preload="metadata">
                    <source src="${beat._signedUrl || ''}" type="audio/mpeg">
                    Your browser does not support audio.
                </audio>
                <div id="audioError-${beat.id}" class="text-red-400 text-xs hidden"></div>
                <button onclick="togglePlayPause('${beat.id}')" id="playbtn-${beat.id}" class="w-full mt-2 btn-outline border border-cyan-500 text-cyan-300 py-2 rounded-xl">▶ PLAY</button>
                <div id="paypal-${beat.id}" class="mt-3"></div>
            </div>
        `).join('');

        beats.forEach(beat => {
            const audio = document.getElementById(`audio-${beat.id}`);
            if (audio) {
                audio.onerror = () => {
                    document.getElementById(`audioError-${beat.id}`).innerText = '❌ Cannot load audio. Check filename or bucket permissions.';
                    document.getElementById(`audioError-${beat.id}`).classList.remove('hidden');
                };
                audio.oncanplay = () => document.getElementById(`audioError-${beat.id}`)?.classList.add('hidden');
            }
            renderPayPal(beat);
        });
    }

    function togglePlayPause(id) {
        const audio = document.getElementById(`audio-${id}`);
        if (audio.paused) audio.play().catch(e => console.warn);
        else audio.pause();
        audio.onplay = () => document.getElementById(`playbtn-${id}`).innerText = '⏸ PAUSE';
        audio.onpause = () => document.getElementById(`playbtn-${id}`).innerText = '▶ PLAY';
    }

    function renderPayPal(beat) {
        const container = document.getElementById(`paypal-${beat.id}`);
        if (!container || !window.paypal) return;
        container.innerHTML = '';
        window.paypal.Buttons({
            createOrder: (data, actions) => actions.order.create({
                purchase_units: [{ amount: { value: beat.price, description: beat.title } }]
            }),
            onApprove: (data, actions) => actions.order.capture().then(() => alert(`Purchased ${beat.title}!`))
        }).render(container);
    }

    // Admin: handle cover upload to B2 (same as before but simplified)
    async function uploadCoverToB2(file) {
        const auth = await b2Authenticate();
        const uploadUrlRes = await fetch(`${b2ApiUrl}/b2api/v2/b2_get_upload_url`, {
            method: 'POST',
            headers: { 'Authorization': b2AuthToken },
            body: JSON.stringify({ bucketId: auth.allowed.bucketId })
        });
        const { uploadUrl, authorizationToken } = await uploadUrlRes.json();
        const fileName = `covers/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.]/g, '-')}`;
        const arrayBuffer = await file.arrayBuffer();
        const hash = await crypto.subtle.digest('SHA-1', arrayBuffer);
        const sha1 = Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
        const res = await fetch(uploadUrl, {
            method: 'POST',
            headers: {
                'Authorization': authorizationToken,
                'X-Bz-File-Name': encodeURIComponent(fileName),
                'Content-Type': file.type,
                'X-Bz-Content-Sha1': sha1
            },
            body: arrayBuffer
        });
        if (!res.ok) throw new Error('Cover upload failed');
        return `${B2_PUBLIC_URL_BASE}/${fileName}`;
    }

    // Admin form handling
    document.getElementById('beatForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('beatId').value || Date.now().toString();
        const title = document.getElementById('beatTitle').value.trim();
        if (!title) return alert('Title required');
        const audioFilename = document.getElementById('beatAudioFilename').value.trim();
        if (!audioFilename) return alert('Enter the audio filename (e.g., beat.mp3) that is already in your B2 bucket');
        
        const newBeat = {
            id,
            title,
            genre: document.getElementById('beatGenre').value || 'Instrumental',
            bpm: document.getElementById('beatBpm').value || '140',
            price: parseFloat(document.getElementById('beatPrice').value).toFixed(2),
            audioFilename: audioFilename,
            coverArt: document.getElementById('beatCoverUrl').value || ''
        };
        const existingIndex = beats.findIndex(b => b.id === id);
        if (existingIndex !== -1) beats[existingIndex] = newBeat;
        else beats.push(newBeat);
        localStorage.setItem('randybeats_data', JSON.stringify(beats));
        resetAdminForm();
        closeAdminModal();
        await renderStore();
    });

    // Cover upload handler
    document.getElementById('coverFileInput')?.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const statusDiv = document.getElementById('coverStatus');
        statusDiv.innerText = 'Uploading cover...';
        try {
            const url = await uploadCoverToB2(file);
            document.getElementById('beatCoverUrl').value = url;
            document.getElementById('coverZoneContent').innerHTML = `<img src="${URL.createObjectURL(file)}" class="h-16 mx-auto rounded">`;
            statusDiv.innerText = '✅ Cover uploaded';
        } catch(err) {
            statusDiv.innerText = 'Cover upload failed: ' + err.message;
        }
    });

    document.getElementById('coverUploadZone')?.addEventListener('click', () => {
        document.getElementById('coverFileInput').click();
    });

    function renderAdminList() {
        const listDiv = document.getElementById('adminBeatList');
        if (!beats.length) { listDiv.innerHTML = '<p class="text-gray-500">No beats</p>'; return; }
        listDiv.innerHTML = beats.map(beat => `
            <div class="flex justify-between items-center bg-white/5 p-3 rounded-xl">
                <div><strong>${beat.title}</strong><br><span class="text-xs text-gray-400">${beat.audioFilename}</span></div>
                <div><button onclick="editBeat('${beat.id}')" class="text-cyan-300 text-sm mr-2">Edit</button><button onclick="deleteBeat('${beat.id}')" class="text-red-400 text-sm">Del</button></div>
            </div>
        `).join('');
    }

    window.editBeat = (id) => {
        const beat = beats.find(b => b.id === id);
        if (!beat) return;
        document.getElementById('beatId').value = beat.id;
        document.getElementById('beatTitle').value = beat.title;
        document.getElementById('beatGenre').value = beat.genre;
        document.getElementById('beatBpm').value = beat.bpm;
        document.getElementById('beatPrice').value = beat.price;
        document.getElementById('beatAudioFilename').value = beat.audioFilename;
        document.getElementById('beatCoverUrl').value = beat.coverArt || '';
        if (beat.coverArt) document.getElementById('coverZoneContent').innerHTML = `<img src="${beat.coverArt}" class="h-16 mx-auto rounded">`;
    };
    window.deleteBeat = (id) => {
        if (confirm('Delete beat?')) {
            beats = beats.filter(b => b.id !== id);
            localStorage.setItem('randybeats_data', JSON.stringify(beats));
            renderAdminList();
            renderStore();
        }
    };
    function resetAdminForm() {
        document.getElementById('beatForm').reset();
        document.getElementById('beatId').value = '';
        document.getElementById('beatCoverUrl').value = '';
        document.getElementById('coverZoneContent').innerHTML = '📸 Click to upload cover';
    }
    function openAdminModal() {
        document.getElementById('adminModal').classList.remove('hidden');
        document.getElementById('adminModal').classList.add('flex');
        document.getElementById('loginScreen').classList.remove('hidden');
        document.getElementById('adminPanel').classList.add('hidden');
    }
    function closeAdminModal() {
        document.getElementById('adminModal').classList.add('hidden');
        resetAdminForm();
    }
    function verifyAdmin() {
        if (document.getElementById('adminPassInput').value === ADMIN_PASSWORD) {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('adminPanel').classList.remove('hidden');
            renderAdminList();
        } else alert('Wrong password');
    }
    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[m];}); }

    renderStore();
    document.getElementById('adminModal').addEventListener('click', (e) => { if (e.target === document.getElementById('adminModal')) closeAdminModal(); });
</script>
</body>
</html>
