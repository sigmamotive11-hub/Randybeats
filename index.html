<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RANDYBEATS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.paypal.com/sdk/js?client-id=AdA9_iV1iAS2sxMJZCT3-Bx1xpdF5U7N2oQalAkZnCjX7BtlAdfpfDl3KHuvW9gQkUeGHoaO0vMcYm11&currency=USD"></script>
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(20,20,40,0.8); backdrop-filter: blur(10px); border-radius: 24px; padding: 1.5rem; border: 1px solid #00e5ff30; transition: 0.3s; }
        .glass-card:hover { transform: translateY(-5px); border-color: #00e5ff; }
        .preview-btn { background: #1a1a2e; border: 1px solid #00e5ff; border-radius: 40px; padding: 8px 20px; font-weight: bold; transition: 0.2s; cursor: pointer; width: 100%; }
        .preview-btn:hover { background: #00e5ff20; }
        .preview-btn.playing { background: #00e5ff20; border-color: #ff00ff; }
        .preview-progress { width: 100%; height: 4px; background: #333; border-radius: 4px; margin: 8px 0; overflow: hidden; }
        .preview-progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #00e5ff, #b026ff); transition: width 0.1s linear; }
        .preview-time { font-size: 11px; color: #aaa; text-align: right; margin-top: 2px; }
        .error-msg { font-size: 11px; color: #ff8888; margin-top: 4px; text-align: center; }
    </style>
</head>
<body class="p-6">
<div class="max-w-7xl mx-auto">
    <div class="flex justify-between items-center mb-8">
        <h1 class="text-4xl font-bold bg-gradient-to-r from-cyan-400 to-purple-500 bg-clip-text text-transparent">RANDYBEATS</h1>
        <a href="admin.html" class="border border-cyan-500 px-4 py-2 rounded-full text-sm">🔐 ADMIN</a>
    </div>
    <div id="beatsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    <div id="loading" class="text-center text-gray-400 py-20">Loading beats...</div>
</div>

<script>
    const JSONBIN_BIN_ID = "69d9031f36566621a89b8120";
    const JSONBIN_API_KEY = "$2a$10$1vAYpinavkrFzHw.xa5ao..1RKHqR9.Pb0cx4ngmXwteD5kTG.dmG";

    let activeAudio = null;
    let activeInterval = null;
    let activeBeatId = null;

    async function loadBeats() {
        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
                headers: { 'X-Master-Key': JSONBIN_API_KEY }
            });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            const beats = data.record || [];
            renderStore(beats);
        } catch (err) {
            document.getElementById('loading').innerHTML = 'Failed to load beats.<br>' + err.message;
        }
    }

    function renderStore(beats) {
        const grid = document.getElementById('beatsGrid');
        const loading = document.getElementById('loading');
        loading.style.display = 'none';
        if (!beats.length) {
            grid.innerHTML = '<div class="text-center text-gray-500 col-span-3">No beats yet. Admin can add.</div>';
            return;
        }
        grid.innerHTML = beats.map(beat => `
            <div class="glass-card">
                ${beat.coverArt ? `<img src="${beat.coverArt}" class="w-full h-48 object-cover rounded-xl mb-4" onerror="this.src='https://placehold.co/400x200/1a1a2e/cyan?text=🎵'">` : `<div class="w-full h-48 bg-gray-800 rounded-xl mb-4 flex items-center justify-center text-4xl">🎧</div>`}
                <h3 class="text-xl font-bold">${escapeHtml(beat.title)}</h3>
                <p class="text-cyan-300 text-sm">${escapeHtml(beat.genre)} • ${beat.bpm} BPM</p>
                <p class="text-2xl font-bold text-pink-400 my-2">$${beat.price}</p>
                
                <div class="my-3">
                    <button class="preview-btn" data-id="${beat.id}" data-url="${beat.audioUrl}">▶ 30s Preview</button>
                    <div class="preview-progress mt-2"><div id="progress-${beat.id}" class="preview-progress-fill"></div></div>
                    <div id="time-${beat.id}" class="preview-time">0:00 / 0:30</div>
                    <div id="error-${beat.id}" class="error-msg hidden"></div>
                </div>
                
                <div id="paypal-${beat.id}" class="mt-3"></div>
            </div>
        `).join('');

        // Attach preview click handlers
        document.querySelectorAll('.preview-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = btn.getAttribute('data-id');
                const url = btn.getAttribute('data-url');
                togglePreview(id, url);
            });
        });

        beats.forEach(beat => {
            if (window.paypal) {
                paypal.Buttons({
                    createOrder: (data, actions) => actions.order.create({
                        purchase_units: [{ amount: { value: beat.price, currency: "USD" }, description: beat.title }]
                    }),
                    onApprove: () => alert("✅ Purchase complete! You will receive the full WAV file download link via email.")
                }).render(`#paypal-${beat.id}`);
            }
        });
    }

    function togglePreview(beatId, audioUrl) {
        // If same beat is playing, stop it
        if (activeBeatId === beatId && activeAudio && !activeAudio.paused) {
            stopPreview();
            return;
        }
        // Stop any currently playing preview
        stopPreview();
        
        // Start new preview
        const btn = document.querySelector(`.preview-btn[data-id="${beatId}"]`);
        const progressFill = document.getElementById(`progress-${beatId}`);
        const timeDisplay = document.getElementById(`time-${beatId}`);
        const errorDiv = document.getElementById(`error-${beatId}`);
        
        btn.textContent = '⏳ Loading...';
        btn.disabled = true;
        errorDiv.classList.add('hidden');
        
        const audio = new Audio();
        audio.src = audioUrl;
        audio.crossOrigin = "Anonymous";
        
        let maxDuration = 30;
        let interval = null;
        
        audio.addEventListener('loadedmetadata', () => {
            maxDuration = Math.min(audio.duration, 30);
            audio.currentTime = 0;
            audio.play().then(() => {
                btn.textContent = '⏸ Pause';
                btn.disabled = false;
                btn.classList.add('playing');
                activeAudio = audio;
                activeBeatId = beatId;
                
                interval = setInterval(() => {
                    if (audio.paused) {
                        // User clicked pause
                        clearInterval(interval);
                        btn.textContent = '▶ 30s Preview';
                        btn.classList.remove('playing');
                        progressFill.style.width = '0%';
                        timeDisplay.textContent = '0:00 / 0:30';
                        activeAudio = null;
                        activeBeatId = null;
                        return;
                    }
                    if (audio.currentTime >= maxDuration) {
                        audio.pause();
                        audio.currentTime = 0;
                        clearInterval(interval);
                        btn.textContent = '▶ 30s Preview';
                        btn.classList.remove('playing');
                        progressFill.style.width = '0%';
                        timeDisplay.textContent = '0:00 / 0:30';
                        activeAudio = null;
                        activeBeatId = null;
                    } else {
                        const percent = (audio.currentTime / maxDuration) * 100;
                        progressFill.style.width = percent + '%';
                        const currentSec = Math.floor(audio.currentTime);
                        timeDisplay.textContent = `${Math.floor(currentSec/60)}:${(currentSec%60).toString().padStart(2,'0')} / 0:${Math.floor(maxDuration)}`;
                    }
                }, 200);
            }).catch(err => {
                console.error('Play error:', err);
                btn.textContent = '▶ 30s Preview';
                btn.disabled = false;
                errorDiv.textContent = '❌ Cannot play audio. Check URL or CORS.';
                errorDiv.classList.remove('hidden');
            });
        });
        
        audio.onerror = () => {
            btn.textContent = '▶ 30s Preview';
            btn.disabled = false;
            errorDiv.textContent = '❌ Failed to load audio. Invalid URL or CORS.';
            errorDiv.classList.remove('hidden');
        };
        
        function stopPreview() {
            if (activeAudio) {
                activeAudio.pause();
                activeAudio.currentTime = 0;
                if (activeInterval) clearInterval(activeInterval);
                const oldBtn = document.querySelector(`.preview-btn[data-id="${activeBeatId}"]`);
                if (oldBtn) {
                    oldBtn.textContent = '▶ 30s Preview';
                    oldBtn.classList.remove('playing');
                }
                const oldProgress = document.getElementById(`progress-${activeBeatId}`);
                if (oldProgress) oldProgress.style.width = '0%';
                const oldTime = document.getElementById(`time-${activeBeatId}`);
                if (oldTime) oldTime.textContent = '0:00 / 0:30';
                activeAudio = null;
                activeBeatId = null;
            }
        }
    }
    
    function stopPreview() {
        if (activeAudio) {
            activeAudio.pause();
            activeAudio.currentTime = 0;
            if (activeInterval) clearInterval(activeInterval);
            const oldBtn = document.querySelector(`.preview-btn[data-id="${activeBeatId}"]`);
            if (oldBtn) {
                oldBtn.textContent = '▶ 30s Preview';
                oldBtn.classList.remove('playing');
            }
            const oldProgress = document.getElementById(`progress-${activeBeatId}`);
            if (oldProgress) oldProgress.style.width = '0%';
            const oldTime = document.getElementById(`time-${activeBeatId}`);
            if (oldTime) oldTime.textContent = '0:00 / 0:30';
            activeAudio = null;
            activeBeatId = null;
        }
    }

    function escapeHtml(str) { 
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }

    loadBeats();
</script>
</body>
</html>
