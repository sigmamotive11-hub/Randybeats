<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>RANDYBEATS | Motion Background</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.paypal.com/sdk/js?client-id=AdA9_iV1iAS2sxMJZCT3-Bx1xpdF5U7N2oQalAkZnCjX7BtlAdfpfDl3KHuvW9gQkUeGHoaO0vMcYm11&currency=USD"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            color: #e5e5e5;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            background: #050508;
        }
        /* Canvas background */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            display: block;
        }
        /* Glass cards with gold accent */
        .beat-card {
            background: rgba(15, 15, 20, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            overflow: hidden;
            box-shadow: 0 20px 35px -15px rgba(0, 0, 0, 0.5);
        }
        .beat-card:hover {
            transform: translateY(-8px);
            border-color: rgba(212, 175, 55, 0.6);
            box-shadow: 0 25px 40px -15px rgba(212, 175, 55, 0.25);
        }
        .cover-img {
            width: 100%;
            height: 210px;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .beat-card:hover .cover-img {
            transform: scale(1.03);
        }
        .placeholder-cover {
            width: 100%;
            height: 210px;
            background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }
        .preview-btn {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(212, 175, 55, 0.5);
            border-radius: 60px;
            padding: 10px 0;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.25s;
            cursor: pointer;
            width: 100%;
            color: #f5e6b0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            backdrop-filter: blur(4px);
        }
        .preview-btn:hover {
            background: rgba(212, 175, 55, 0.15);
            border-color: #d4af37;
            color: white;
            transform: scale(0.98);
        }
        .preview-btn.playing {
            background: rgba(212, 175, 55, 0.25);
            border-color: #f5e6b0;
            animation: pulseGlow 1s infinite;
        }
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.4); }
            70% { box-shadow: 0 0 0 8px rgba(212, 175, 55, 0); }
            100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #2a2a2a;
            border-radius: 4px;
            margin: 12px 0 6px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #d4af37, #f5e6b0);
            width: 0%;
            transition: width 0.1s linear;
        }
        .time-text {
            font-size: 11px;
            font-family: monospace;
            color: #9ca3af;
            text-align: right;
        }
        .error-msg {
            font-size: 11px;
            color: #ff8888;
            text-align: center;
            margin-top: 8px;
        }
        .price {
            background: linear-gradient(135deg, #d4af37, #f5e6b0);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            font-weight: 800;
            font-size: 1.8rem;
            letter-spacing: -0.02em;
        }
        .genre-badge {
            background: rgba(212, 175, 55, 0.15);
            border-radius: 30px;
            padding: 3px 12px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #f5e6b0;
        }
        .admin-btn {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            transition: 0.2s;
            border-radius: 40px;
            padding: 8px 20px;
            font-weight: 500;
        }
        .admin-btn:hover {
            background: rgba(212, 175, 55, 0.15);
            border-color: #d4af37;
        }
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #d4af37;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="max-w-7xl mx-auto px-5 py-8 relative z-10">
        <!-- Header -->
        <div class="flex justify-between items-center mb-14 flex-wrap gap-4">
            <div>
                <h1 class="text-5xl md:text-6xl font-extrabold tracking-tight">
                    <span class="bg-gradient-to-r from-yellow-400 to-amber-600 bg-clip-text text-transparent">RANDYBEATS</span>
                </h1>
                <p class="text-gray-300 text-sm mt-1">premium instrumentals · wav format</p>
            </div>
            <a href="admin.html" class="admin-btn text-sm transition">🔐 Admin Panel</a>
        </div>

        <!-- Beats Grid -->
        <div id="beatsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        <div id="loading" class="text-center text-gray-400 py-24 text-lg">Loading beats...</div>
    </div>

    <script>
        // ==================== INTERACTIVE CANVAS BACKGROUND ====================
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        let mouseX = 0, mouseY = 0;
        let targetX = 0, targetY = 0;

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        window.addEventListener('resize', () => {
            resizeCanvas();
            initParticles();
        });

        window.addEventListener('mousemove', (e) => {
            targetX = e.clientX;
            targetY = e.clientY;
            // smooth interpolation
            mouseX = mouseX * 0.95 + targetX * 0.05;
            mouseY = mouseY * 0.95 + targetY * 0.05;
        });

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2.5 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.3;
                this.speedY = (Math.random() - 0.5) * 0.2;
                this.alpha = Math.random() * 0.4 + 0.1;
                this.color = `rgba(212, 175, 55, ${this.alpha})`;
            }
            update() {
                // mouse influence: particles move away from mouse slightly
                const dx = this.x - mouseX;
                const dy = this.y - mouseY;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < 150) {
                    const angle = Math.atan2(dy, dx);
                    const force = (150 - dist) / 150 * 0.5;
                    this.x += Math.cos(angle) * force;
                    this.y += Math.sin(angle) * force;
                }
                this.x += this.speedX;
                this.y += this.speedY;
                // wrap around
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            const count = Math.min(300, Math.floor(width * height / 8000));
            for (let i = 0; i < count; i++) {
                particles.push(new Particle());
            }
        }

        let gradientOffset = 0;
        function drawBackground() {
            // gradient that shifts over time
            const grad = ctx.createLinearGradient(0, 0, width, height);
            const shift = (Date.now() * 0.0003) % 1;
            grad.addColorStop(0, `hsl(40, 30%, ${5 + Math.sin(shift) * 2}%)`);
            grad.addColorStop(0.5, `hsl(280, 25%, 8%)`);
            grad.addColorStop(1, `hsl(20, 20%, 3%)`);
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, height);
            // draw subtle vignette
            const vignette = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, width/1.5);
            vignette.addColorStop(0, 'rgba(0,0,0,0)');
            vignette.addColorStop(1, 'rgba(0,0,0,0.6)');
            ctx.fillStyle = vignette;
            ctx.fillRect(0, 0, width, height);
        }

        function animateBackground() {
            if (!ctx) return;
            drawBackground();
            for (let p of particles) {
                p.update();
                p.draw();
            }
            requestAnimationFrame(animateBackground);
        }

        function startCanvas() {
            resizeCanvas();
            initParticles();
            animateBackground();
        }

        startCanvas();

        // ==================== BEAT STORE LOGIC (unchanged, working) ====================
        const JSONBIN_BIN_ID = "69d9031f36566621a89b8120";
        const JSONBIN_API_KEY = "$2a$10$1vAYpinavkrFzHw.xa5ao..1RKHqR9.Pb0cx4ngmXwteD5kTG.dmG";

        let activeAudio = null;
        let activeInterval = null;
        let activeBeatId = null;

        async function loadBeats() {
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': JSONBIN_API_KEY }
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                const beats = data.record || [];
                renderStore(beats);
            } catch (err) {
                document.getElementById('loading').innerHTML = 'Failed to load beats.<br>' + err.message;
            }
        }

        function renderStore(beats) {
            const grid = document.getElementById('beatsGrid');
            const loadingDiv = document.getElementById('loading');
            loadingDiv.style.display = 'none';
            if (!beats.length) {
                grid.innerHTML = '<div class="col-span-full text-center text-gray-400 py-16">✨ No beats yet — add some in the admin panel.</div>';
                return;
            }
            grid.innerHTML = beats.map(beat => `
                <div class="beat-card">
                    ${beat.coverArt ? `<img src="${beat.coverArt}" class="cover-img" onerror="this.src='https://placehold.co/600x400/1a1a1a/white?text=🎵'">` : `<div class="placeholder-cover">🎧</div>`}
                    <div class="p-5">
                        <div class="flex justify-between items-start gap-3">
                            <div>
                                <h3 class="text-xl font-bold tracking-tight">${escapeHtml(beat.title)}</h3>
                                <div class="flex items-center gap-2 mt-2">
                                    <span class="genre-badge">${escapeHtml(beat.genre)}</span>
                                    <span class="text-sm text-amber-300 font-medium">${beat.bpm} BPM</span>
                                </div>
                            </div>
                            <span class="price">$${beat.price}</span>
                        </div>
                        <div class="mt-5">
                            <button class="preview-btn" data-id="${beat.id}" data-url="${beat.audioUrl}">
                                <span class="play-icon">▶</span> 30s Preview
                            </button>
                            <div class="progress-bar"><div id="progress-${beat.id}" class="progress-fill"></div></div>
                            <div id="time-${beat.id}" class="time-text">0:00 / 0:30</div>
                            <div id="error-${beat.id}" class="error-msg hidden"></div>
                        </div>
                        <div id="paypal-${beat.id}" class="mt-5"></div>
                    </div>
                </div>
            `).join('');

            document.querySelectorAll('.preview-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const id = btn.getAttribute('data-id');
                    const url = btn.getAttribute('data-url');
                    togglePreview(id, url);
                });
            });

            beats.forEach(beat => {
                if (window.paypal) {
                    paypal.Buttons({
                        createOrder: (data, actions) => actions.order.create({
                            purchase_units: [{ amount: { value: beat.price, currency: "USD" }, description: beat.title }]
                        }),
                        onApprove: () => alert("✅ Purchase complete! You'll receive the full WAV download link via email.")
                    }).render(`#paypal-${beat.id}`);
                }
            });
        }

        function togglePreview(beatId, audioUrl) {
            if (activeBeatId === beatId && activeAudio && !activeAudio.paused) {
                stopPreview();
                return;
            }
            stopPreview();

            const btn = document.querySelector(`.preview-btn[data-id="${beatId}"]`);
            const progressFill = document.getElementById(`progress-${beatId}`);
            const timeDisplay = document.getElementById(`time-${beatId}`);
            const errorDiv = document.getElementById(`error-${beatId}`);

            btn.innerHTML = '<span>⏳</span> Loading...';
            btn.disabled = true;
            errorDiv.classList.add('hidden');

            const audio = new Audio();
            audio.src = audioUrl;
            audio.crossOrigin = "Anonymous";

            let maxDuration = 30;
            let interval = null;

            audio.addEventListener('loadedmetadata', () => {
                maxDuration = Math.min(audio.duration, 30);
                audio.currentTime = 0;
                audio.play().then(() => {
                    btn.innerHTML = '<span>⏸</span> Pause';
                    btn.disabled = false;
                    btn.classList.add('playing');
                    activeAudio = audio;
                    activeBeatId = beatId;

                    interval = setInterval(() => {
                        if (audio.paused) {
                            clearInterval(interval);
                            btn.innerHTML = '<span>▶</span> 30s Preview';
                            btn.classList.remove('playing');
                            progressFill.style.width = '0%';
                            timeDisplay.textContent = '0:00 / 0:30';
                            activeAudio = null;
                            activeBeatId = null;
                            return;
                        }
                        if (audio.currentTime >= maxDuration) {
                            audio.pause();
                            audio.currentTime = 0;
                            clearInterval(interval);
                            btn.innerHTML = '<span>▶</span> 30s Preview';
                            btn.classList.remove('playing');
                            progressFill.style.width = '0%';
                            timeDisplay.textContent = '0:00 / 0:30';
                            activeAudio = null;
                            activeBeatId = null;
                        } else {
                            const percent = (audio.currentTime / maxDuration) * 100;
                            progressFill.style.width = percent + '%';
                            const currentSec = Math.floor(audio.currentTime);
                            timeDisplay.textContent = `${Math.floor(currentSec/60)}:${(currentSec%60).toString().padStart(2,'0')} / 0:${Math.floor(maxDuration)}`;
                        }
                    }, 200);
                }).catch(err => {
                    btn.innerHTML = '<span>▶</span> 30s Preview';
                    btn.disabled = false;
                    errorDiv.textContent = '❌ Cannot play audio. Check URL or CORS.';
                    errorDiv.classList.remove('hidden');
                });
            });

            audio.onerror = () => {
                btn.innerHTML = '<span>▶</span> 30s Preview';
                btn.disabled = false;
                errorDiv.textContent = '❌ Failed to load audio. Invalid URL or CORS.';
                errorDiv.classList.remove('hidden');
            };
        }

        function stopPreview() {
            if (activeAudio) {
                activeAudio.pause();
                activeAudio.currentTime = 0;
                if (activeInterval) clearInterval(activeInterval);
                const oldBtn = document.querySelector(`.preview-btn[data-id="${activeBeatId}"]`);
                if (oldBtn) {
                    oldBtn.innerHTML = '<span>▶</span> 30s Preview';
                    oldBtn.classList.remove('playing');
                }
                const oldProgress = document.getElementById(`progress-${activeBeatId}`);
                if (oldProgress) oldProgress.style.width = '0%';
                const oldTime = document.getElementById(`time-${activeBeatId}`);
                if (oldTime) oldTime.textContent = '0:00 / 0:30';
                activeAudio = null;
                activeBeatId = null;
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
        }

        loadBeats();
    </script>
</body>
</html>
