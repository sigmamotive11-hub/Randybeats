<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RANDYBEATS | Liquid Beats</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.paypal.com/sdk/js?client-id=AdA9_iV1iAS2sxMJZCT3-Bx1xpdF5U7N2oQalAkZnCjX7BtlAdfpfDl3KHuvW9gQkUeGHoaO0vMcYm11&currency=USD"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a1a;
            min-height: 100vh;
            overflow-x: hidden;
        }
        /* Liquid gradient background */
        .liquid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        }
        .blob {
            position: fixed;
            width: 70vw;
            height: 70vw;
            background: radial-gradient(circle, rgba(0,255,200,0.25), rgba(255,0,150,0.1));
            filter: blur(100px);
            border-radius: 50%;
            animation: float1 20s infinite alternate;
            z-index: -1;
        }
        .blob2 {
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(255,100,200,0.3), rgba(0,200,255,0.1));
            animation: float2 25s infinite alternate;
            bottom: -20vh;
            right: -10vw;
            top: auto;
            left: auto;
        }
        @keyframes float1 {
            0% { transform: translate(-10%, -10%) scale(1); opacity: 0.5; }
            100% { transform: translate(10%, 15%) scale(1.3); opacity: 0.8; }
        }
        @keyframes float2 {
            0% { transform: translate(5%, 5%) scale(1); opacity: 0.4; }
            100% { transform: translate(-15%, -10%) scale(1.4); opacity: 0.7; }
        }
        /* Glass card */
        .beat-card {
            background: rgba(20, 18, 35, 0.55);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
            overflow: hidden;
            box-shadow: 0 20px 35px -15px rgba(0,0,0,0.4);
        }
        .beat-card:hover {
            transform: translateY(-6px);
            border-color: rgba(0,255,200,0.5);
            box-shadow: 0 25px 40px -15px rgba(0,255,200,0.2);
        }
        .cover-img {
            width: 100%;
            height: 210px;
            object-fit: cover;
            transition: transform 0.4s;
        }
        .beat-card:hover .cover-img {
            transform: scale(1.02);
        }
        .placeholder-cover {
            width: 100%;
            height: 210px;
            background: linear-gradient(135deg, #1e1a3a, #110e26);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }
        .preview-btn {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(0,255,200,0.5);
            border-radius: 60px;
            padding: 10px 0;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
            cursor: pointer;
            width: 100%;
            color: #cfffea;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .preview-btn:hover {
            background: rgba(0,255,200,0.15);
            border-color: #0ff;
            color: white;
            transform: scale(0.98);
        }
        .preview-btn.playing {
            background: rgba(0,255,200,0.25);
            border-color: #ff66cc;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0,255,200,0.4); }
            70% { box-shadow: 0 0 0 8px rgba(0,255,200,0); }
            100% { box-shadow: 0 0 0 0 rgba(0,255,200,0); }
        }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #2a2e3f;
            border-radius: 4px;
            margin: 12px 0 6px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #0ff, #f0f);
            width: 0%;
            transition: width 0.1s linear;
        }
        .time-text {
            font-size: 11px;
            font-family: monospace;
            color: #9ca3af;
            text-align: right;
        }
        .error-msg {
            font-size: 11px;
            color: #ff8888;
            text-align: center;
            margin-top: 8px;
        }
        .price {
            background: linear-gradient(135deg, #0ff, #f6f);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            font-weight: 800;
            font-size: 1.8rem;
        }
        .genre-badge {
            background: rgba(0,255,200,0.15);
            border-radius: 30px;
            padding: 3px 12px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #b0ffe0;
        }
        .admin-btn {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0,255,200,0.3);
            border-radius: 40px;
            padding: 8px 20px;
            font-weight: 500;
            transition: 0.2s;
        }
        .admin-btn:hover {
            background: rgba(0,255,200,0.15);
            border-color: #0ff;
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #1a1a2e; }
        ::-webkit-scrollbar-thumb { background: #0ff; border-radius: 10px; }
    </style>
</head>
<body>

<div class="liquid-bg"></div>
<div class="blob"></div>
<div class="blob blob2"></div>

<div class="max-w-7xl mx-auto px-5 py-8 relative z-10">
    <div class="flex justify-between items-center mb-14 flex-wrap gap-4">
        <div>
            <h1 class="text-5xl md:text-6xl font-extrabold bg-gradient-to-r from-cyan-300 via-white to-pink-300 bg-clip-text text-transparent">RANDYBEATS</h1>
            <p class="text-gray-300 text-sm mt-1">liquid instrumentals · wav premium</p>
        </div>
        <a href="admin.html" class="admin-btn text-sm">🔐 Admin Panel</a>
    </div>

    <div id="beatsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    <div id="loading" class="text-center text-gray-400 py-24 text-lg">Loading beats...</div>
</div>

<script>
    const JSONBIN_BIN_ID = "69d9031f36566621a89b8120";
    const JSONBIN_API_KEY = "$2a$10$1vAYpinavkrFzHw.xa5ao..1RKHqR9.Pb0cx4ngmXwteD5kTG.dmG";

    let activeAudio = null;
    let activeInterval = null;
    let activeBeatId = null;

    async function loadBeats() {
        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
                headers: { 'X-Master-Key': JSONBIN_API_KEY }
            });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            const beats = data.record || [];
            renderStore(beats);
        } catch (err) {
            document.getElementById('loading').innerHTML = 'Failed to load beats.<br>' + err.message;
        }
    }

    function renderStore(beats) {
        const grid = document.getElementById('beatsGrid');
        const loadingDiv = document.getElementById('loading');
        loadingDiv.style.display = 'none';
        if (!beats.length) {
            grid.innerHTML = '<div class="col-span-full text-center text-gray-500 py-16">✨ No beats yet — add some in the admin panel.</div>';
            return;
        }
        grid.innerHTML = beats.map(beat => `
            <div class="beat-card">
                ${beat.coverArt ? `<img src="${beat.coverArt}" class="cover-img" onerror="this.src='https://placehold.co/600x400/1e1a3a/white?text=🎵'">` : `<div class="placeholder-cover">🎧</div>`}
                <div class="p-5">
                    <div class="flex justify-between items-start gap-3">
                        <div>
                            <h3 class="text-xl font-bold">${escapeHtml(beat.title)}</h3>
                            <div class="flex items-center gap-2 mt-2">
                                <span class="genre-badge">${escapeHtml(beat.genre)}</span>
                                <span class="text-sm text-cyan-300">${beat.bpm} BPM</span>
                            </div>
                        </div>
                        <span class="price">$${beat.price}</span>
                    </div>
                    <div class="mt-5">
                        <button class="preview-btn" data-id="${beat.id}" data-url="${beat.audioUrl}">▶ 30s Preview</button>
                        <div class="progress-bar"><div id="progress-${beat.id}" class="progress-fill"></div></div>
                        <div id="time-${beat.id}" class="time-text">0:00 / 0:30</div>
                        <div id="error-${beat.id}" class="error-msg hidden"></div>
                    </div>
                    <div id="paypal-${beat.id}" class="mt-5"></div>
                </div>
            </div>
        `).join('');

        document.querySelectorAll('.preview-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = btn.getAttribute('data-id');
                const url = btn.getAttribute('data-url');
                togglePreview(id, url);
            });
        });

        beats.forEach(beat => {
            if (window.paypal) {
                paypal.Buttons({
                    createOrder: (data, actions) => actions.order.create({
                        purchase_units: [{ amount: { value: beat.price, currency: "USD" }, description: beat.title }]
                    }),
                    onApprove: () => alert("✅ Purchase complete! You'll receive the full WAV download link via email.")
                }).render(`#paypal-${beat.id}`);
            }
        });
    }

    function togglePreview(beatId, audioUrl) {
        if (activeBeatId === beatId && activeAudio && !activeAudio.paused) {
            stopPreview();
            return;
        }
        stopPreview();

        const btn = document.querySelector(`.preview-btn[data-id="${beatId}"]`);
        const progressFill = document.getElementById(`progress-${beatId}`);
        const timeDisplay = document.getElementById(`time-${beatId}`);
        const errorDiv = document.getElementById(`error-${beatId}`);

        btn.innerHTML = '⏳ Loading...';
        btn.disabled = true;
        errorDiv.classList.add('hidden');

        const audio = new Audio();
        audio.src = audioUrl;
        audio.crossOrigin = "Anonymous";

        let maxDuration = 30;
        let interval = null;

        audio.addEventListener('loadedmetadata', () => {
            maxDuration = Math.min(audio.duration, 30);
            audio.currentTime = 0;
            audio.play().then(() => {
                btn.innerHTML = '⏸ Pause';
                btn.disabled = false;
                btn.classList.add('playing');
                activeAudio = audio;
                activeBeatId = beatId;

                interval = setInterval(() => {
                    if (audio.paused) {
                        clearInterval(interval);
                        btn.innerHTML = '▶ 30s Preview';
                        btn.classList.remove('playing');
                        progressFill.style.width = '0%';
                        timeDisplay.textContent = '0:00 / 0:30';
                        activeAudio = null;
                        activeBeatId = null;
                        return;
                    }
                    if (audio.currentTime >= maxDuration) {
                        audio.pause();
                        audio.currentTime = 0;
                        clearInterval(interval);
                        btn.innerHTML = '▶ 30s Preview';
                        btn.classList.remove('playing');
                        progressFill.style.width = '0%';
                        timeDisplay.textContent = '0:00 / 0:30';
                        activeAudio = null;
                        activeBeatId = null;
                    } else {
                        const percent = (audio.currentTime / maxDuration) * 100;
                        progressFill.style.width = percent + '%';
                        const currentSec = Math.floor(audio.currentTime);
                        timeDisplay.textContent = `${Math.floor(currentSec/60)}:${(currentSec%60).toString().padStart(2,'0')} / 0:${Math.floor(maxDuration)}`;
                    }
                }, 200);
            }).catch(err => {
                btn.innerHTML = '▶ 30s Preview';
                btn.disabled = false;
                errorDiv.textContent = '❌ Cannot play audio. Check URL or CORS.';
                errorDiv.classList.remove('hidden');
            });
        });

        audio.onerror = () => {
            btn.innerHTML = '▶ 30s Preview';
            btn.disabled = false;
            errorDiv.textContent = '❌ Failed to load audio. Invalid URL or CORS.';
            errorDiv.classList.remove('hidden');
        };
    }

    function stopPreview() {
        if (activeAudio) {
            activeAudio.pause();
            activeAudio.currentTime = 0;
            if (activeInterval) clearInterval(activeInterval);
            const oldBtn = document.querySelector(`.preview-btn[data-id="${activeBeatId}"]`);
            if (oldBtn) {
                oldBtn.innerHTML = '▶ 30s Preview';
                oldBtn.classList.remove('playing');
            }
            const oldProgress = document.getElementById(`progress-${activeBeatId}`);
            if (oldProgress) oldProgress.style.width = '0%';
            const oldTime = document.getElementById(`time-${activeBeatId}`);
            if (oldTime) oldTime.textContent = '0:00 / 0:30';
            activeAudio = null;
            activeBeatId = null;
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }

    loadBeats();
</script>
</body>
</html>
