<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>RANDYBEATS | Premium Instrumentals</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.paypal.com/sdk/js?client-id=AdA9_iV1iAS2sxMJZCT3-Bx1xpdF5U7N2oQalAkZnCjX7BtlAdfpfDl3KHuvW9gQkUeGHoaO0vMcYm11&currency=USD"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(145deg, #0c0a1a 0%, #030014 100%);
            color: #f0f0f0;
            min-height: 100vh;
        }

        /* Animated grain texture */
        .grain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-repeat: repeat;
        }

        /* Floating orbs */
        .orb {
            position: fixed;
            width: 50vw;
            height: 50vw;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.4;
        }
        .orb-1 {
            background: radial-gradient(circle, #a855f7, #d946ef);
            top: -20vh;
            right: -10vw;
            animation: float1 20s infinite alternate;
        }
        .orb-2 {
            background: radial-gradient(circle, #06b6d4, #3b82f6);
            bottom: -30vh;
            left: -10vw;
            animation: float2 25s infinite alternate;
        }
        @keyframes float1 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(5%, 5%) scale(1.2); }
        }
        @keyframes float2 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-5%, -5%) scale(1.3); }
        }

        /* Glass card */
        .beat-card {
            background: rgba(20, 18, 35, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            overflow: hidden;
            box-shadow: 0 20px 35px -15px rgba(0, 0, 0, 0.5);
        }
        .beat-card:hover {
            transform: translateY(-8px) scale(1.01);
            border-color: rgba(168, 85, 247, 0.4);
            box-shadow: 0 25px 40px -15px rgba(168, 85, 247, 0.3);
        }
        .cover-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .beat-card:hover .cover-img {
            transform: scale(1.03);
        }
        .placeholder-cover {
            width: 100%;
            height: 220px;
            background: linear-gradient(135deg, #2a1e3c, #1a1028);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
        }

        /* Interactive preview button */
        .preview-btn {
            background: rgba(30, 27, 50, 0.8);
            border: 1px solid rgba(168, 85, 247, 0.5);
            border-radius: 40px;
            padding: 10px 0;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.25s;
            cursor: pointer;
            width: 100%;
            color: #e2e8ff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            backdrop-filter: blur(4px);
        }
        .preview-btn:hover {
            background: rgba(168, 85, 247, 0.2);
            border-color: #a855f7;
            color: white;
            transform: scale(0.98);
        }
        .preview-btn.playing {
            background: rgba(168, 85, 247, 0.35);
            border-color: #f0a;
            color: white;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(168, 85, 247, 0.5); }
            70% { box-shadow: 0 0 0 8px rgba(168, 85, 247, 0); }
            100% { box-shadow: 0 0 0 0 rgba(168, 85, 247, 0); }
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #2a2a3a;
            border-radius: 4px;
            margin: 12px 0 6px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #a855f7, #ec4899);
            width: 0%;
            transition: width 0.1s linear;
        }
        .time-text {
            font-size: 11px;
            font-family: monospace;
            color: #9ca3af;
            text-align: right;
        }
        .error-msg {
            font-size: 11px;
            color: #f87171;
            text-align: center;
            margin-top: 8px;
        }
        .price {
            background: linear-gradient(135deg, #f472b6, #a855f7);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            font-weight: 800;
            font-size: 1.8rem;
            letter-spacing: -0.02em;
        }
        .genre-badge {
            background: rgba(168, 85, 247, 0.2);
            border-radius: 30px;
            padding: 3px 12px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #d8b4fe;
        }
        .admin-btn {
            background: rgba(255,255,255,0.02);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(168, 85, 247, 0.3);
            transition: 0.2s;
            border-radius: 40px;
            padding: 8px 20px;
            font-weight: 500;
        }
        .admin-btn:hover {
            background: rgba(168, 85, 247, 0.15);
            border-color: #a855f7;
        }

        /* custom scroll */
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #1e1a2e;
        }
        ::-webkit-scrollbar-thumb {
            background: #a855f7;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="grain"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="max-w-7xl mx-auto px-5 py-8 relative z-10">
    <!-- Header with interactive glow -->
    <div class="flex justify-between items-center mb-14 flex-wrap gap-4">
        <div class="group">
            <h1 class="text-5xl md:text-6xl font-extrabold tracking-tight bg-gradient-to-r from-purple-300 via-pink-300 to-indigo-300 bg-clip-text text-transparent drop-shadow-xl">
                RANDYBEATS
            </h1>
            <p class="text-gray-400 text-sm mt-1 group-hover:text-purple-300 transition">premium instrumentals · wav format</p>
        </div>
        <a href="admin.html" class="admin-btn text-sm transition">🔐 Admin Panel</a>
    </div>

    <!-- Beats Grid -->
    <div id="beatsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    <div id="loading" class="text-center text-gray-500 py-24 text-lg">Loading beats...</div>
</div>

<script>
    // ==================== CONFIG (same working core) ====================
    const JSONBIN_BIN_ID = "69d9031f36566621a89b8120";
    const JSONBIN_API_KEY = "$2a$10$1vAYpinavkrFzHw.xa5ao..1RKHqR9.Pb0cx4ngmXwteD5kTG.dmG";

    let activeAudio = null;
    let activeInterval = null;
    let activeBeatId = null;

    async function loadBeats() {
        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
                headers: { 'X-Master-Key': JSONBIN_API_KEY }
            });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            const beats = data.record || [];
            renderStore(beats);
        } catch (err) {
            document.getElementById('loading').innerHTML = 'Failed to load beats.<br>' + err.message;
        }
    }

    function renderStore(beats) {
        const grid = document.getElementById('beatsGrid');
        const loadingDiv = document.getElementById('loading');
        loadingDiv.style.display = 'none';
        if (!beats.length) {
            grid.innerHTML = '<div class="col-span-full text-center text-gray-500 py-16">✨ No beats yet — add some in the admin panel.</div>';
            return;
        }
        grid.innerHTML = beats.map(beat => `
            <div class="beat-card">
                ${beat.coverArt ? `<img src="${beat.coverArt}" class="cover-img" onerror="this.src='https://placehold.co/600x400/2a1e3c/white?text=🎵'">` : `<div class="placeholder-cover">🎧</div>`}
                <div class="p-5">
                    <div class="flex justify-between items-start gap-3">
                        <div>
                            <h3 class="text-xl font-bold leading-tight tracking-tight">${escapeHtml(beat.title)}</h3>
                            <div class="flex items-center gap-2 mt-2 flex-wrap">
                                <span class="genre-badge">${escapeHtml(beat.genre)}</span>
                                <span class="text-sm text-indigo-300 font-medium">${beat.bpm} BPM</span>
                            </div>
                        </div>
                        <span class="price">$${beat.price}</span>
                    </div>
                    
                    <!-- Preview controls -->
                    <div class="mt-5">
                        <button class="preview-btn" data-id="${beat.id}" data-url="${beat.audioUrl}">
                            <span class="play-icon">▶</span> 30s Preview
                        </button>
                        <div class="progress-bar"><div id="progress-${beat.id}" class="progress-fill"></div></div>
                        <div id="time-${beat.id}" class="time-text">0:00 / 0:30</div>
                        <div id="error-${beat.id}" class="error-msg hidden"></div>
                    </div>
                    
                    <!-- PayPal button container -->
                    <div id="paypal-${beat.id}" class="mt-5"></div>
                </div>
            </div>
        `).join('');

        // Attach preview click handlers
        document.querySelectorAll('.preview-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = btn.getAttribute('data-id');
                const url = btn.getAttribute('data-url');
                togglePreview(id, url);
            });
        });

        // Render PayPal buttons
        beats.forEach(beat => {
            if (window.paypal) {
                paypal.Buttons({
                    createOrder: (data, actions) => actions.order.create({
                        purchase_units: [{ amount: { value: beat.price, currency: "USD" }, description: beat.title }]
                    }),
                    onApprove: () => alert("✅ Purchase complete! You'll receive the full WAV download link via email.")
                }).render(`#paypal-${beat.id}`);
            }
        });
    }

    function togglePreview(beatId, audioUrl) {
        if (activeBeatId === beatId && activeAudio && !activeAudio.paused) {
            stopPreview();
            return;
        }
        stopPreview();

        const btn = document.querySelector(`.preview-btn[data-id="${beatId}"]`);
        const progressFill = document.getElementById(`progress-${beatId}`);
        const timeDisplay = document.getElementById(`time-${beatId}`);
        const errorDiv = document.getElementById(`error-${beatId}`);

        btn.innerHTML = '<span>⏳</span> Loading...';
        btn.disabled = true;
        errorDiv.classList.add('hidden');

        const audio = new Audio();
        audio.src = audioUrl;
        audio.crossOrigin = "Anonymous";

        let maxDuration = 30;
        let interval = null;

        audio.addEventListener('loadedmetadata', () => {
            maxDuration = Math.min(audio.duration, 30);
            audio.currentTime = 0;
            audio.play().then(() => {
                btn.innerHTML = '<span>⏸</span> Pause';
                btn.disabled = false;
                btn.classList.add('playing');
                activeAudio = audio;
                activeBeatId = beatId;

                interval = setInterval(() => {
                    if (audio.paused) {
                        clearInterval(interval);
                        btn.innerHTML = '<span>▶</span> 30s Preview';
                        btn.classList.remove('playing');
                        progressFill.style.width = '0%';
                        timeDisplay.textContent = '0:00 / 0:30';
                        activeAudio = null;
                        activeBeatId = null;
                        return;
                    }
                    if (audio.currentTime >= maxDuration) {
                        audio.pause();
                        audio.currentTime = 0;
                        clearInterval(interval);
                        btn.innerHTML = '<span>▶</span> 30s Preview';
                        btn.classList.remove('playing');
                        progressFill.style.width = '0%';
                        timeDisplay.textContent = '0:00 / 0:30';
                        activeAudio = null;
                        activeBeatId = null;
                    } else {
                        const percent = (audio.currentTime / maxDuration) * 100;
                        progressFill.style.width = percent + '%';
                        const currentSec = Math.floor(audio.currentTime);
                        timeDisplay.textContent = `${Math.floor(currentSec/60)}:${(currentSec%60).toString().padStart(2,'0')} / 0:${Math.floor(maxDuration)}`;
                    }
                }, 200);
            }).catch(err => {
                btn.innerHTML = '<span>▶</span> 30s Preview';
                btn.disabled = false;
                errorDiv.textContent = '❌ Cannot play audio. Check URL or CORS.';
                errorDiv.classList.remove('hidden');
            });
        });

        audio.onerror = () => {
            btn.innerHTML = '<span>▶</span> 30s Preview';
            btn.disabled = false;
            errorDiv.textContent = '❌ Failed to load audio. Invalid URL or CORS.';
            errorDiv.classList.remove('hidden');
        };
    }

    function stopPreview() {
        if (activeAudio) {
            activeAudio.pause();
            activeAudio.currentTime = 0;
            if (activeInterval) clearInterval(activeInterval);
            const oldBtn = document.querySelector(`.preview-btn[data-id="${activeBeatId}"]`);
            if (oldBtn) {
                oldBtn.innerHTML = '<span>▶</span> 30s Preview';
                oldBtn.classList.remove('playing');
            }
            const oldProgress = document.getElementById(`progress-${activeBeatId}`);
            if (oldProgress) oldProgress.style.width = '0%';
            const oldTime = document.getElementById(`time-${activeBeatId}`);
            if (oldTime) oldTime.textContent = '0:00 / 0:30';
            activeAudio = null;
            activeBeatId = null;
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }

    loadBeats();
</script>
</body>
</html>
