<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RANDYBEATS - Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0804;
            color: #f5f0e0;
            min-height: 100vh;
            overflow-x: hidden;
        }
        #gold-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            display: block;
        }
        .glass-card {
            background: rgba(20, 18, 12, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            border: 1px solid rgba(212, 175, 55, 0.4);
            box-shadow: 0 20px 35px -15px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }
        .glass-card:hover { border-color: #d4af37; }
        input, textarea, select {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 16px;
            padding: 10px 14px;
            color: #f5f0e0;
            width: 100%;
        }
        input:focus, textarea:focus { outline: none; border-color: #ffd700; }
        button {
            background: rgba(212, 175, 55, 0.2);
            border: 1px solid #d4af37;
            border-radius: 40px;
            padding: 10px 20px;
            font-weight: 600;
            cursor: pointer;
            color: #f5e6b0;
        }
        button:hover { background: rgba(212, 175, 55, 0.4); border-color: #ffd700; color: white; }
        .delete-btn { background: rgba(180, 50, 50, 0.3); border-color: #b8860b; }
        .delete-btn:hover { background: rgba(200, 60, 60, 0.6); }
        .upload-zone {
            border: 2px dashed rgba(212, 175, 55, 0.5);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
        }
        .upload-zone:hover { border-color: #ffd700; background: rgba(212, 175, 55, 0.05); }
        .cover-preview { width: 80px; height: 80px; object-fit: cover; border-radius: 16px; border: 1px solid #d4af37; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #1a150c; }
        ::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 10px; }
    </style>
</head>
<body>
<canvas id="gold-canvas"></canvas>
<div class="max-w-7xl mx-auto px-5 py-8 relative z-10" id="adminContainer"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
    import { getFirestore, collection, getDocs, doc, addDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

    // ==================== YOUR FIREBASE CONFIG (UPDATED) ====================
    const firebaseConfig = {
        apiKey: "AIzaSyDKeXaVaYtcwnrxYQWUYdZVy7yMdgdK7TQ",
        authDomain: "randybeats-2dfb0.firebaseapp.com",
        projectId: "randybeats-2dfb0",
        storageBucket: "randybeats-2dfb0.firebasestorage.app",
        messagingSenderId: "190194060319",
        appId: "1:190194060319:web:e4ca35186c0c2edbd1d92a"
    };
    // =======================================================================

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // === ADMIN UID (provided by user) ===
    const ADMIN_UID = "IajG51UNTUOYYvPIlFm5TmdV9Sv2";

    // ImgBB API key
    const IMGBB_API_KEY = "03082f5cb5527bff5741a6dc7fe146d1";

    let beats = [];
    let currentUser = null;
    const container = document.getElementById('adminContainer');

    // ==================== GOLD CANVAS BACKGROUND ====================
    const canvas = document.getElementById('gold-canvas');
    const ctx = canvas.getContext('2d');
    let width, height, goldBars = [], particles = [], mouseX=0, mouseY=0, targetX=0, targetY=0;
    function resizeCanvas() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
    window.addEventListener('resize', () => { resizeCanvas(); initGoldBars(); initParticles(); });
    window.addEventListener('mousemove', (e) => { targetX = e.clientX; targetY = e.clientY; mouseX = mouseX*0.95+targetX*0.05; mouseY = mouseY*0.95+targetY*0.05; });
    class GoldBar { constructor() { this.x = Math.random()*width; this.y = Math.random()*height; this.w = Math.random()*60+30; this.h = Math.random()*15+8; this.angle = Math.random()*Math.PI*2; this.rotSpeed = (Math.random()-0.5)*0.005; this.moveX = (Math.random()-0.5)*0.3; this.moveY = (Math.random()-0.5)*0.2; this.opacity = Math.random()*0.25+0.1; }
    update() { let dx = this.x - mouseX, dy = this.y - mouseY, dist = Math.hypot(dx,dy); if(dist<120){ let angle = Math.atan2(dy,dx), force = (120-dist)/120*0.8; this.x += Math.cos(angle)*force; this.y += Math.sin(angle)*force; } this.x += this.moveX; this.y += this.moveY; this.angle += this.rotSpeed; if(this.x<-100) this.x=width+100; if(this.x>width+100) this.x=-100; if(this.y<-100) this.y=height+100; if(this.y>height+100) this.y=-100; }
    draw() { ctx.save(); ctx.translate(this.x,this.y); ctx.rotate(this.angle); let grad = ctx.createLinearGradient(-this.w/2,-this.h/2,this.w/2,this.h/2); grad.addColorStop(0,`rgba(212,175,55,${this.opacity*0.8})`); grad.addColorStop(0.5,`rgba(255,215,0,${this.opacity})`); grad.addColorStop(1,`rgba(184,134,11,${this.opacity*0.7})`); ctx.fillStyle=grad; ctx.shadowBlur=12; ctx.shadowColor=`rgba(212,175,55,${this.opacity*0.6})`; ctx.fillRect(-this.w/2,-this.h/2,this.w,this.h); ctx.strokeStyle=`rgba(255,235,140,${this.opacity*0.8})`; ctx.lineWidth=1; ctx.strokeRect(-this.w/2,-this.h/2,this.w,this.h); ctx.restore(); } }
    class GoldParticle { constructor() { this.x = Math.random()*width; this.y = Math.random()*height; this.size = Math.random()*2+0.8; this.speedX = (Math.random()-0.5)*0.2; this.speedY = (Math.random()-0.5)*0.15; this.alpha = Math.random()*0.4+0.15; }
    update() { this.x += this.speedX; this.y += this.speedY; if(this.x<0) this.x=width; if(this.x>width) this.x=0; if(this.y<0) this.y=height; if(this.y>height) this.y=0; }
    draw() { ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fillStyle=`rgba(255,215,0,${this.alpha})`; ctx.fill(); } }
    function initGoldBars() { goldBars = []; let barCount = Math.min(35, Math.floor(width/80)); for(let i=0;i<barCount;i++) goldBars.push(new GoldBar()); }
    function initParticles() { particles = []; let particleCount = Math.min(200, Math.floor(width*height/12000)); for(let i=0;i<particleCount;i++) particles.push(new GoldParticle()); }
    function drawBackground() { let grad = ctx.createLinearGradient(0,0,width,height); grad.addColorStop(0,'#0a0804'); grad.addColorStop(0.5,'#1c160c'); grad.addColorStop(1,'#0d0a05'); ctx.fillStyle=grad; ctx.fillRect(0,0,width,height); let radGrad = ctx.createRadialGradient(width/2,height/2,50,width/2,height/2,width/1.2); radGrad.addColorStop(0,'rgba(212,175,55,0.05)'); radGrad.addColorStop(1,'rgba(0,0,0,0)'); ctx.fillStyle=radGrad; ctx.fillRect(0,0,width,height); }
    function animate() { if(!ctx) return; drawBackground(); for(let bar of goldBars) { bar.update(); bar.draw(); } for(let p of particles) { p.update(); p.draw(); } requestAnimationFrame(animate); }
    function startCanvas() { resizeCanvas(); initGoldBars(); initParticles(); animate(); }
    startCanvas();

    // ==================== ADMIN UI FUNCTIONS ====================
    function showLogin() {
        container.innerHTML = `
            <div class="flex items-center justify-center min-h-[80vh]">
                <div class="glass-card p-8 max-w-md w-full text-center">
                    <h2 class="text-2xl font-bold mb-4">🔐 Admin Login</h2>
                    <input type="email" id="adminEmail" placeholder="Email" class="w-full mb-3">
                    <input type="password" id="adminPassword" placeholder="Password" class="w-full mb-4">
                    <button id="adminLoginBtn" class="w-full bg-amber-600 text-black font-bold py-2 rounded-full">Login</button>
                </div>
            </div>
        `;
        document.getElementById('adminLoginBtn').addEventListener('click', async () => {
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (err) {
                alert("Login failed: " + err.message);
            }
        });
    }

    function showAccessDenied() {
        container.innerHTML = `
            <div class="flex items-center justify-center min-h-[80vh]">
                <div class="glass-card p-8 max-w-md w-full text-center">
                    <h2 class="text-2xl font-bold mb-4">⛔ Access Denied</h2>
                    <p>You do not have permission to access this admin area.</p>
                    <button onclick="signOut(auth)" class="mt-4 bg-amber-600 px-4 py-2 rounded-full">Logout</button>
                </div>
            </div>
        `;
    }

    async function loadBeats() {
        const snapshot = await getDocs(collection(db, 'beats'));
        beats = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderAdminPanel();
    }

    async function saveBeat(beatData, beatId = null) {
        if (beatId) {
            const beatRef = doc(db, 'beats', beatId);
            await updateDoc(beatRef, beatData);
        } else {
            await addDoc(collection(db, 'beats'), beatData);
        }
        await loadBeats();
    }

    async function deleteBeat(beatId) {
        if (confirm('Delete this beat permanently?')) {
            await deleteDoc(doc(db, 'beats', beatId));
            await loadBeats();
        }
    }

    async function uploadCover(file) {
        const fd = new FormData();
        fd.append('image', file);
        fd.append('key', IMGBB_API_KEY);
        const res = await fetch('https://api.imgbb.com/1/upload', { method: 'POST', body: fd });
        const data = await res.json();
        if (!data.success) throw new Error(data.error?.message);
        return data.data.url;
    }

    function renderAdminPanel() {
        container.innerHTML = `
            <div class="flex justify-between items-center mb-8 flex-wrap gap-4">
                <h1 class="text-4xl md:text-5xl font-extrabold bg-gradient-to-r from-yellow-400 to-amber-500 bg-clip-text text-transparent">RANDYBEATS · ADMIN</h1>
                <button id="logoutBtn" class="admin-logout-btn">🚪 Logout</button>
            </div>
            <div class="mb-8">
                <button id="addBeatBtn" class="bg-gradient-to-r from-amber-600 to-yellow-600 text-black font-bold px-6 py-3 rounded-full shadow-lg">+ Add New Beat</button>
            </div>
            <div id="beatsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        `;
        document.getElementById('addBeatBtn').addEventListener('click', () => openBeatModal());
        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

        const grid = document.getElementById('beatsGrid');
        if (!beats.length) {
            grid.innerHTML = '<div class="col-span-full text-center text-amber-400/60 py-16">No beats yet. Click "+ Add New Beat" to start.</div>';
            return;
        }
        grid.innerHTML = beats.map(beat => `
            <div class="glass-card p-4">
                <div class="flex gap-3">
                    ${beat.coverArt ? `<img src="${beat.coverArt}" class="w-16 h-16 rounded-xl object-cover border border-amber-500">` : `<div class="w-16 h-16 bg-black/50 rounded-xl flex items-center justify-center text-2xl">🎧</div>`}
                    <div class="flex-1">
                        <h3 class="font-bold text-lg text-amber-100">${escapeHtml(beat.title)}</h3>
                        <p class="text-sm text-amber-400">${escapeHtml(beat.genre)} • ${beat.bpm} BPM</p>
                        <p class="text-yellow-400 font-bold">$${beat.price}</p>
                        ${beat.tags ? `<p class="text-xs text-gray-400">${escapeHtml(beat.tags)}</p>` : ''}
                    </div>
                </div>
                <div class="flex gap-2 mt-3">
                    <button class="edit-beat-btn flex-1 bg-amber-600/20 hover:bg-amber-600/40 py-2 rounded-lg text-sm" data-id="${beat.id}">Edit</button>
                    <button class="delete-beat-btn flex-1 delete-btn py-2 rounded-lg text-sm" data-id="${beat.id}">Delete</button>
                </div>
            </div>
        `).join('');

        document.querySelectorAll('.edit-beat-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = btn.getAttribute('data-id');
                const beat = beats.find(b => b.id === id);
                if (beat) openBeatModal(beat);
            });
        });
        document.querySelectorAll('.delete-beat-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = btn.getAttribute('data-id');
                deleteBeat(id);
            });
        });
    }

    function openBeatModal(beat = null) {
        const modal = document.createElement('div');
        modal.className = 'fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 p-4';
        modal.innerHTML = `
            <div class="glass-card max-w-lg w-full p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-2xl font-bold text-amber-300">${beat ? 'Edit Beat' : 'Add New Beat'}</h2>
                    <button class="close-modal text-gray-400 text-2xl">&times;</button>
                </div>
                <form id="adminBeatForm">
                    <input type="hidden" id="beatId" value="${beat ? beat.id : ''}">
                    <div class="mb-3"><label class="block text-sm mb-1">Title *</label><input type="text" id="title" value="${beat ? escapeHtml(beat.title) : ''}" required></div>
                    <div class="grid grid-cols-2 gap-3 mb-3">
                        <div><label class="block text-sm mb-1">Genre</label><input type="text" id="genre" value="${beat ? escapeHtml(beat.genre) : ''}" placeholder="Trap, Drill..."></div>
                        <div><label class="block text-sm mb-1">BPM</label><input type="number" id="bpm" value="${beat ? beat.bpm : ''}" placeholder="140"></div>
                    </div>
                    <div class="mb-3"><label class="block text-sm mb-1">Tags (comma separated)</label><input type="text" id="tags" value="${beat ? escapeHtml(beat.tags) : ''}" placeholder="dark, melodic"></div>
                    <div class="mb-3"><label class="block text-sm mb-1">Price (USD) *</label><input type="number" step="0.01" id="price" value="${beat ? beat.price : ''}" required></div>
                    <div class="mb-3"><label class="block text-sm mb-1">Audio URL *</label><input type="url" id="audioUrl" value="${beat ? beat.audioUrl : ''}" placeholder="https://files.catbox.moe/xxxxx.wav" required></div>
                    <div class="mb-4">
                        <label class="block text-sm mb-1">Cover Art (optional)</label>
                        <div id="coverUploadZone" class="upload-zone"><input type="file" id="coverFile" accept="image/*" class="hidden"><div id="coverPreview" class="text-center">${beat && beat.coverArt ? `<img src="${beat.coverArt}" class="cover-preview mx-auto"><p class="text-xs mt-1">Current cover</p>` : '<div class="text-3xl mb-1">🖼️</div><p class="text-sm">Click to upload</p>'}</div></div>
                        <input type="hidden" id="coverUrl" value="${beat ? beat.coverArt : ''}">
                        <div id="uploadStatus" class="text-xs mt-1"></div>
                    </div>
                    <div class="flex gap-3">
                        <button type="submit" class="flex-1 bg-gradient-to-r from-amber-600 to-yellow-600 text-black font-bold py-3 rounded-xl">Save Beat</button>
                        <button type="button" class="cancel-modal px-5 border border-gray-600 rounded-xl">Cancel</button>
                    </div>
                </form>
            </div>
        `;
        document.body.appendChild(modal);

        const closeModal = () => modal.remove();
        modal.querySelector('.close-modal').addEventListener('click', closeModal);
        modal.querySelector('.cancel-modal').addEventListener('click', closeModal);

        const uploadZone = modal.querySelector('#coverUploadZone');
        const coverFile = modal.querySelector('#coverFile');
        const coverPreview = modal.querySelector('#coverPreview');
        const coverUrlInput = modal.querySelector('#coverUrl');
        const statusDiv = modal.querySelector('#uploadStatus');

        uploadZone.addEventListener('click', () => coverFile.click());
        coverFile.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            statusDiv.innerText = 'Uploading...';
            try {
                const url = await uploadCover(file);
                coverUrlInput.value = url;
                coverPreview.innerHTML = `<img src="${url}" class="cover-preview mx-auto"><p class="text-xs mt-1 text-green-400">✓ Uploaded</p>`;
                statusDiv.innerText = '';
            } catch (err) {
                statusDiv.innerText = 'Upload failed';
            }
        });

        modal.querySelector('#adminBeatForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const beatId = modal.querySelector('#beatId').value;
            const beatData = {
                title: modal.querySelector('#title').value.trim(),
                genre: modal.querySelector('#genre').value.trim() || 'Instrumental',
                bpm: modal.querySelector('#bpm').value || '140',
                price: parseFloat(modal.querySelector('#price').value).toFixed(2),
                audioUrl: modal.querySelector('#audioUrl').value.trim(),
                coverArt: modal.querySelector('#coverUrl').value || '',
                tags: modal.querySelector('#tags').value.trim() || ''
            };
            if (!beatData.title) { alert('Title required'); return; }
            if (!beatData.audioUrl) { alert('Audio URL required'); return; }
            await saveBeat(beatData, beatId || null);
            closeModal();
        });
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

    // ==================== AUTH STATE LISTENER ====================
    onAuthStateChanged(auth, async (user) => {
        currentUser = user;
        if (user && user.uid === ADMIN_UID) {
            await loadBeats();
        } else if (user) {
            showAccessDenied();
        } else {
            showLogin();
        }
    });
</script>
</body>
</html>
