<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - RANDYBEATS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0a; color: white; font-family: Arial, sans-serif; }
        input, button { border-radius: 12px; padding: 10px; margin: 8px 0; width: 100%; }
        input { background: #1a1a2e; border: 1px solid #333; color: white; }
        button { background: #00e5ff; color: black; font-weight: bold; cursor: pointer; }
        .delete-btn { background: #ff4444; color: white; }
        .card { background: #111; border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid #2a2a3a; }
    </style>
</head>
<body class="p-6 max-w-3xl mx-auto">
    <h1 class="text-3xl font-bold mb-4">RANDYBEATS - Admin</h1>
    <div id="loginDiv" class="card">
        <input type="password" id="adminPassword" placeholder="Admin Password">
        <button onclick="checkLogin()">Login</button>
    </div>
    <div id="adminPanel" style="display:none;" class="space-y-6">
        <div class="card">
            <h2>➕ Add Beat</h2>
            <form id="beatForm">
                <input type="text" id="title" placeholder="Title" required>
                <input type="text" id="genre" placeholder="Genre">
                <input type="number" id="bpm" placeholder="BPM">
                <input type="number" step="0.01" id="price" placeholder="Price" required>
                <input type="url" id="audioUrl" placeholder="Audio URL (catbox.moe WAV)" required>
                <input type="url" id="coverArt" placeholder="Cover URL (optional)">
                <button type="submit">Save Beat</button>
            </form>
        </div>
        <div class="card">
            <h2>📀 Beats</h2>
            <div id="beatsList"></div>
        </div>
    </div>
    <script>
        const JSONBIN_BIN_ID = "69d9031f36566621a89b8120";
        // ⚠️ REPLACE THIS WITH YOUR *NEW* API KEY AFTER YOU REVOKE THE OLD ONE
        const JSONBIN_API_KEY = "$2a$10$1vAYpinavkrFzHw.xa5ao..1RKHqR9.Pb0cx4ngmXwteD5kTG.dmG";
        const ADMIN_PASSWORD = "randybeats2025";

        let beats = [];

        async function loadBeats() {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
                headers: { 'X-Master-Key': JSONBIN_API_KEY }
            });
            const data = await res.json();
            beats = data.record || [];
            renderBeatList();
        }

        async function saveBeats() {
            await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_API_KEY },
                body: JSON.stringify(beats)
            });
        }

        function renderBeatList() {
            const container = document.getElementById('beatsList');
            if (!beats.length) { container.innerHTML = '<p>No beats</p>'; return; }
            container.innerHTML = beats.map(beat => `
                <div class="bg-gray-800 p-3 rounded mb-2">
                    <strong>${escapeHtml(beat.title)}</strong> - $${beat.price}<br>
                    <button class="delete-btn mt-1" onclick="deleteBeat('${beat.id}')">Delete</button>
                </div>
            `).join('');
        }

        window.deleteBeat = async (id) => {
            if (confirm('Delete?')) {
                beats = beats.filter(b => b.id !== id);
                await saveBeats();
                renderBeatList();
            }
        };

        document.getElementById('beatForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newBeat = {
                id: Date.now().toString(),
                title: document.getElementById('title').value,
                genre: document.getElementById('genre').value || 'Instrumental',
                bpm: document.getElementById('bpm').value || '140',
                price: parseFloat(document.getElementById('price').value).toFixed(2),
                audioUrl: document.getElementById('audioUrl').value,
                coverArt: document.getElementById('coverArt').value || ''
            };
            beats.push(newBeat);
            await saveBeats();
            renderBeatList();
            document.getElementById('beatForm').reset();
            alert('Beat added');
        });

        function checkLogin() {
            if (document.getElementById('adminPassword').value === ADMIN_PASSWORD) {
                document.getElementById('loginDiv').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                loadBeats();
            } else alert('Wrong password');
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
        }
    </script>
</body>
</html>
