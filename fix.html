<!DOCTYPE html>
<html>
<head>
    <title>Fix JSONBin Privacy</title>
    <style>
        body { font-family: monospace; max-width: 600px; margin: 50px auto; padding: 20px; background: #0a0a0a; color: white; }
        pre { background: #1a1a2e; padding: 10px; border-radius: 8px; overflow-x: auto; }
        .success { color: #00e5ff; }
        .error { color: #ff4444; }
    </style>
</head>
<body>
    <h2>Making your JSONBin public...</h2>
    <div id="log"></div>

    <script>
        const BIN_ID = "69d9031f36566621a89b8120";
        const MASTER_KEY = "$2a$10$1vAYpinavkrFzHw.xa5ao..1RKHqR9.Pb0cx4ngmXwteD5kTG.dmG";

        async function makePublic() {
            const logDiv = document.getElementById('log');
            logDiv.innerHTML = '<p>⏳ Sending request to JSONBin API...</p>';
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/meta/privacy`, {
                    method: 'PUT',
                    headers: {
                        'X-Master-Key': MASTER_KEY,
                        'X-Bin-Private': 'false'
                    }
                });
                const data = await response.json();
                if (response.ok && data.metadata && data.metadata.private === false) {
                    logDiv.innerHTML = '<p class="success">✅ Success! Your bin is now PUBLIC.</p><p>You can close this page and use the store/admin files below.</p>';
                } else {
                    logDiv.innerHTML = `<p class="error">❌ Failed: ${data.message || 'Unknown error'}</p>`;
                }
            } catch (err) {
                logDiv.innerHTML = `<p class="error">❌ Network error: ${err.message}</p>`;
            }
        }
        makePublic();
    </script>
</body>
</html>
