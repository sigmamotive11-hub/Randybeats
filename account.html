<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RANDYBEATS | Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0804;
            color: #f5f0e0;
            min-height: 100vh;
            overflow-x: hidden;
        }
        #gold-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            display: block;
        }
        .glass-card {
            background: rgba(20, 18, 12, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            border: 1px solid rgba(212, 175, 55, 0.4);
            padding: 2rem;
        }
        input {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(212,175,55,0.4);
            border-radius: 40px;
            padding: 12px 16px;
            color: white;
            width: 100%;
        }
        input:focus { outline: none; border-color: #ffd700; }
        .btn-gold {
            background: linear-gradient(135deg, #d4af37, #ffd700);
            color: black;
            font-weight: bold;
            padding: 12px;
            border-radius: 40px;
            width: 100%;
            text-align: center;
            display: inline-block;
        }
        .auth-tab {
            display: inline-block;
            padding: 8px 20px;
            cursor: pointer;
            border-radius: 40px;
            background: rgba(255,255,255,0.1);
        }
        .auth-tab.active { background: #d4af37; color: black; }
    </style>
</head>
<body>
<canvas id="gold-canvas"></canvas>
<div class="max-w-md mx-auto px-5 py-12 relative z-10">
    <div class="text-center mb-8">
        <a href="landing.html" class="text-3xl font-bold bg-gradient-to-r from-yellow-400 to-amber-500 bg-clip-text text-transparent">RANDYBEATS</a>
        <p class="text-gray-400 mt-2">Sign in or create an account</p>
    </div>
    <div class="glass-card">
        <div class="flex gap-2 mb-6 border-b border-gray-700 pb-2">
            <button class="auth-tab active" data-tab="login">Sign In</button>
            <button class="auth-tab" data-tab="signup">Sign Up</button>
        </div>
        <div id="loginTab">
            <input type="email" id="loginEmail" placeholder="Email" class="mb-3">
            <input type="password" id="loginPassword" placeholder="Password" class="mb-4">
            <button id="emailLoginBtn" class="btn-gold mb-3">Sign In with Email</button>
            <button id="googleLoginBtn" class="w-full bg-white/10 border border-white/20 py-3 rounded-full mb-2">Sign In with Google</button>
            <div class="relative my-4"><div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-600"></div></div><div class="relative flex justify-center text-xs"><span class="bg-black/50 px-2">OR</span></div></div>
            <div class="flex gap-2">
                <input type="tel" id="phoneNumber" placeholder="+1234567890" class="flex-1">
                <button id="sendOtpBtn" class="bg-amber-600 px-4 rounded-full">Send OTP</button>
            </div>
            <div id="otpSection" style="display:none;" class="mt-3">
                <input type="text" id="otpCode" placeholder="6-digit code" class="mb-2">
                <button id="verifyOtpBtn" class="w-full bg-amber-600 py-2 rounded-full">Verify & Sign In</button>
            </div>
        </div>
        <div id="signupTab" style="display:none;">
            <input type="email" id="signupEmail" placeholder="Email" class="mb-3">
            <input type="password" id="signupPassword" placeholder="Password" class="mb-4">
            <button id="emailSignupBtn" class="btn-gold">Create Account</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, createUserWithEmailAndPassword, signInWithEmailAndPassword, RecaptchaVerifier, signInWithPhoneNumber, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDKeXaVaYtcwnrxYQWUYdZVy7yMdgdK7TQ",
        authDomain: "randybeats-2dfb0.firebaseapp.com",
        projectId: "randybeats-2dfb0",
        storageBucket: "randybeats-2dfb0.firebasestorage.app",
        messagingSenderId: "190194060319",
        appId: "1:190194060319:web:e4ca35186c0c2edbd1d92a"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const googleProvider = new GoogleAuthProvider();

    let recaptchaVerifier = null;
    let confirmationResult = null;

    // Tab switching
    document.querySelectorAll('.auth-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            const target = tab.dataset.tab;
            document.getElementById('loginTab').style.display = target === 'login' ? 'block' : 'none';
            document.getElementById('signupTab').style.display = target === 'signup' ? 'block' : 'none';
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
        });
    });

    // Email Sign Up
    document.getElementById('emailSignupBtn').addEventListener('click', async () => {
        const email = document.getElementById('signupEmail').value;
        const password = document.getElementById('signupPassword').value;
        try {
            await createUserWithEmailAndPassword(auth, email, password);
            alert("Account created! You are now signed in.");
            window.location.href = 'catalog.html';
        } catch (err) { alert(err.message); }
    });

    // Email Sign In
    document.getElementById('emailLoginBtn').addEventListener('click', async () => {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        try {
            await signInWithEmailAndPassword(auth, email, password);
            window.location.href = 'catalog.html';
        } catch (err) { alert(err.message); }
    });

    // Google Sign In
    document.getElementById('googleLoginBtn').addEventListener('click', async () => {
        try {
            await signInWithPopup(auth, googleProvider);
            window.location.href = 'catalog.html';
        } catch (err) { alert(err.message); }
    });

    // Phone Number Auth
    function setupRecaptcha() {
        if (!recaptchaVerifier) {
            recaptchaVerifier = new RecaptchaVerifier(auth, 'sendOtpBtn', {
                size: 'invisible',
                callback: () => {}
            });
        }
        recaptchaVerifier.render();
    }
    document.getElementById('sendOtpBtn').addEventListener('click', async () => {
        const phoneNumber = document.getElementById('phoneNumber').value;
        if (!phoneNumber) { alert("Enter phone number with country code"); return; }
        setupRecaptcha();
        try {
            confirmationResult = await signInWithPhoneNumber(auth, phoneNumber, recaptchaVerifier);
            document.getElementById('otpSection').style.display = 'block';
            alert("OTP sent!");
        } catch (err) { alert(err.message); }
    });
    document.getElementById('verifyOtpBtn').addEventListener('click', async () => {
        const otp = document.getElementById('otpCode').value;
        if (!otp || !confirmationResult) return;
        try {
            await confirmationResult.confirm(otp);
            window.location.href = 'catalog.html';
        } catch (err) { alert("Invalid OTP"); }
    });

    // If already logged in, redirect to catalog
    onAuthStateChanged(auth, (user) => {
        if (user) window.location.href = 'catalog.html';
    });

    // Gold canvas (same)
    const canvas = document.getElementById('gold-canvas');
    const ctx = canvas.getContext('2d');
    let width, height, goldBars = [], particles = [], mouseX=0, mouseY=0, targetX=0, targetY=0;
    function resizeCanvas() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
    window.addEventListener('resize', () => { resizeCanvas(); initGoldBars(); initParticles(); });
    window.addEventListener('mousemove', (e) => { targetX = e.clientX; targetY = e.clientY; mouseX = mouseX*0.95+targetX*0.05; mouseY = mouseY*0.95+targetY*0.05; });
    class GoldBar { constructor() { this.x = Math.random()*width; this.y = Math.random()*height; this.w = Math.random()*60+30; this.h = Math.random()*15+8; this.angle = Math.random()*Math.PI*2; this.rotSpeed = (Math.random()-0.5)*0.005; this.moveX = (Math.random()-0.5)*0.3; this.moveY = (Math.random()-0.5)*0.2; this.opacity = Math.random()*0.25+0.1; }
    update() { let dx = this.x - mouseX, dy = this.y - mouseY, dist = Math.hypot(dx,dy); if(dist<120){ let angle = Math.atan2(dy,dx), force = (120-dist)/120*0.8; this.x += Math.cos(angle)*force; this.y += Math.sin(angle)*force; } this.x += this.moveX; this.y += this.moveY; this.angle += this.rotSpeed; if(this.x<-100) this.x=width+100; if(this.x>width+100) this.x=-100; if(this.y<-100) this.y=height+100; if(this.y>height+100) this.y=-100; }
    draw() { ctx.save(); ctx.translate(this.x,this.y); ctx.rotate(this.angle); let grad = ctx.createLinearGradient(-this.w/2,-this.h/2,this.w/2,this.h/2); grad.addColorStop(0,`rgba(212,175,55,${this.opacity*0.8})`); grad.addColorStop(0.5,`rgba(255,215,0,${this.opacity})`); grad.addColorStop(1,`rgba(184,134,11,${this.opacity*0.7})`); ctx.fillStyle=grad; ctx.shadowBlur=12; ctx.shadowColor=`rgba(212,175,55,${this.opacity*0.6})`; ctx.fillRect(-this.w/2,-this.h/2,this.w,this.h); ctx.strokeStyle=`rgba(255,235,140,${this.opacity*0.8})`; ctx.lineWidth=1; ctx.strokeRect(-this.w/2,-this.h/2,this.w,this.h); ctx.restore(); } }
    class GoldParticle { constructor() { this.x = Math.random()*width; this.y = Math.random()*height; this.size = Math.random()*2+0.8; this.speedX = (Math.random()-0.5)*0.2; this.speedY = (Math.random()-0.5)*0.15; this.alpha = Math.random()*0.4+0.15; }
    update() { this.x += this.speedX; this.y += this.speedY; if(this.x<0) this.x=width; if(this.x>width) this.x=0; if(this.y<0) this.y=height; if(this.y>height) this.y=0; }
    draw() { ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fillStyle=`rgba(255,215,0,${this.alpha})`; ctx.fill(); } }
    function initGoldBars() { goldBars = []; let barCount = Math.min(35, Math.floor(width/80)); for(let i=0;i<barCount;i++) goldBars.push(new GoldBar()); }
    function initParticles() { particles = []; let particleCount = Math.min(200, Math.floor(width*height/12000)); for(let i=0;i<particleCount;i++) particles.push(new GoldParticle()); }
    function drawBackground() { let grad = ctx.createLinearGradient(0,0,width,height); grad.addColorStop(0,'#0a0804'); grad.addColorStop(0.5,'#1c160c'); grad.addColorStop(1,'#0d0a05'); ctx.fillStyle=grad; ctx.fillRect(0,0,width,height); let radGrad = ctx.createRadialGradient(width/2,height/2,50,width/2,height/2,width/1.2); radGrad.addColorStop(0,'rgba(212,175,55,0.05)'); radGrad.addColorStop(1,'rgba(0,0,0,0)'); ctx.fillStyle=radGrad; ctx.fillRect(0,0,width,height); }
    function animate() { if(!ctx) return; drawBackground(); for(let bar of goldBars) { bar.update(); bar.draw(); } for(let p of particles) { p.update(); p.draw(); } requestAnimationFrame(animate); }
    function startCanvas() { resizeCanvas(); initGoldBars(); initParticles(); animate(); }
    startCanvas();
</script>
</body>
</html>
