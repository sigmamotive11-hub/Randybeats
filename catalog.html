<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RANDYBEATS | Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0804;
            color: #f5f0e0;
            min-height: 100vh;
            overflow-x: hidden;
        }
        #gold-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; display: block; }
        .beat-card {
            background: rgba(20,18,12,0.7);
            backdrop-filter: blur(14px);
            border-radius: 28px;
            border: 1px solid rgba(212,175,55,0.4);
            transition: all 0.4s;
            overflow: hidden;
        }
        .beat-card:hover { transform: translateY(-8px); border-color: #d4af37; }
        .cover-img { width: 100%; height: 210px; object-fit: cover; }
        .placeholder-cover { width: 100%; height: 210px; background: linear-gradient(135deg, #2a2418, #1a150c); display: flex; align-items: center; justify-content: center; font-size: 3rem; }
        .preview-btn {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(212,175,55,0.6);
            border-radius: 60px;
            padding: 10px 0;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            color: #f5e6b0;
            text-align: center;
        }
        .preview-btn:hover { background: rgba(212,175,55,0.2); border-color: #ffd700; }
        .preview-btn.playing { background: rgba(212,175,55,0.3); animation: pulseGold 1s infinite; }
        @keyframes pulseGold {
            0% { box-shadow: 0 0 0 0 rgba(212,175,55,0.5); }
            70% { box-shadow: 0 0 0 8px rgba(212,175,55,0); }
            100% { box-shadow: 0 0 0 0 rgba(212,175,55,0); }
        }
        .progress-bar { width: 100%; height: 4px; background: #2a2418; border-radius: 4px; margin: 12px 0 6px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #d4af37, #ffd700); width: 0%; transition: width 0.1s linear; }
        .time-text { font-size: 11px; font-family: monospace; color: #d4af37; text-align: right; }
        .price { background: linear-gradient(135deg, #ffd700, #b8860b); background-clip: text; -webkit-background-clip: text; color: transparent; font-weight: 800; font-size: 1.8rem; }
        .genre-badge, .tag-badge { background: rgba(212,175,55,0.2); border-radius: 30px; padding: 3px 12px; font-size: 0.7rem; font-weight: 600; color: #ffd700; display: inline-block; }
        .filter-panel { background: rgba(20,18,12,0.6); backdrop-filter: blur(12px); border-radius: 28px; border: 1px solid rgba(212,175,55,0.3); padding: 1rem; margin-bottom: 2rem; }
        input, select { background: rgba(0,0,0,0.5); border: 1px solid rgba(212,175,55,0.4); border-radius: 40px; padding: 8px 16px; color: #f5f0e0; width: 100%; }
        input:focus, select:focus { outline: none; border-color: #ffd700; }
    </style>
</head>
<body>
<canvas id="gold-canvas"></canvas>
<div class="max-w-7xl mx-auto px-5 py-8 relative z-10">
    <div class="flex justify-between items-center mb-8">
        <a href="landing.html" class="text-2xl font-bold bg-gradient-to-r from-yellow-400 to-amber-500 bg-clip-text text-transparent">RANDYBEATS</a>
        <div class="space-x-3">
            <a href="account.html" class="border border-amber-500 rounded-full px-5 py-2 text-sm">Sign In</a>
        </div>
    </div>

    <!-- Filter Panel -->
    <div class="filter-panel">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
            <input type="text" id="searchInput" placeholder="Search title, genre, tags...">
            <select id="genreFilter"><option value="">All Genres</option><option>Trap</option><option>Drill</option><option>RnB</option><option>Lo-fi</option><option>Pop</option></select>
            <div class="flex gap-2 items-center"><span class="text-sm">BPM:</span><input type="range" id="bpmMin" min="60" max="180" value="60"><span id="bpmMinVal">60</span><span>-</span><input type="range" id="bpmMax" min="60" max="180" value="180"><span id="bpmMaxVal">180</span></div>
            <button onclick="resetFilters()" class="bg-amber-600/30 border border-amber-500 rounded-full py-2">Reset</button>
        </div>
    </div>

    <div id="beatsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    <div id="loading" class="text-center text-amber-300/60 py-24">Loading beats...</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDKeXaVaYtcwnrxYQWUYdZVy7yMdgdK7TQ",
        authDomain: "randybeats-2dfb0.firebaseapp.com",
        projectId: "randybeats-2dfb0",
        storageBucket: "randybeats-2dfb0.firebasestorage.app",
        messagingSenderId: "190194060319",
        appId: "1:190194060319:web:e4ca35186c0c2edbd1d92a"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let beats = [], filteredBeats = [];
    let activeAudio = null, activeBeatId = null, activeInterval = null;
    let currentUser = null;

    onAuthStateChanged(auth, (user) => { currentUser = user; });

    async function loadBeats() {
        const snapshot = await getDocs(collection(db, 'beats'));
        beats = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        applyFilters();
    }

    function applyFilters() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const genre = document.getElementById('genreFilter').value;
        const bpmMin = parseInt(document.getElementById('bpmMin').value);
        const bpmMax = parseInt(document.getElementById('bpmMax').value);
        filteredBeats = beats.filter(b => {
            if (genre && b.genre !== genre) return false;
            let bpm = parseInt(b.bpm);
            if (bpm < bpmMin || bpm > bpmMax) return false;
            if (search && !b.title.toLowerCase().includes(search) && !(b.genre && b.genre.toLowerCase().includes(search)) && !(b.tags && b.tags.toLowerCase().includes(search))) return false;
            return true;
        });
        renderStore();
    }

    function renderStore() {
        const grid = document.getElementById('beatsGrid');
        const loading = document.getElementById('loading');
        loading.style.display = 'none';
        if (!filteredBeats.length) { grid.innerHTML = '<div class="col-span-full text-center py-16">✨ No beats match your filters.</div>'; return; }
        grid.innerHTML = filteredBeats.map(beat => `
            <div class="beat-card p-5">
                ${beat.coverArt ? `<img src="${beat.coverArt}" class="cover-img rounded-xl mb-4" onerror="this.src='https://placehold.co/600x400/2a2418/white?text=🎵'">` : `<div class="placeholder-cover rounded-xl mb-4">🎧</div>`}
                <div class="flex justify-between items-start">
                    <div><h3 class="text-xl font-bold">${escapeHtml(beat.title)}</h3><div class="flex gap-2 mt-1"><span class="genre-badge">${escapeHtml(beat.genre)}</span><span class="text-sm text-amber-400">${beat.bpm} BPM</span></div></div>
                    <span class="price">$${beat.price}</span>
                </div>
                <div class="mt-4">
                    <button class="preview-btn w-full" data-id="${beat.id}" data-url="${beat.audioUrl}">▶ 30s Preview</button>
                    <div class="progress-bar"><div id="progress-${beat.id}" class="progress-fill"></div></div>
                    <div id="time-${beat.id}" class="time-text">0:00 / 0:30</div>
                    <div id="error-${beat.id}" class="text-red-400 text-xs hidden"></div>
                </div>
                <button class="buy-now-btn w-full mt-4 bg-gradient-to-r from-amber-600 to-yellow-600 text-black font-bold py-2 rounded-full" data-id="${beat.id}" data-price="${beat.price}" data-title="${beat.title}">Buy Now</button>
            </div>
        `).join('');
        attachPreviewEvents();
        attachBuyEvents();
    }

    function attachPreviewEvents() {
        document.querySelectorAll('.preview-btn').forEach(btn => {
            btn.removeEventListener('click', previewHandler);
            btn.addEventListener('click', previewHandler);
        });
    }
    function previewHandler(e) {
        const btn = e.currentTarget;
        const id = btn.getAttribute('data-id');
        const url = btn.getAttribute('data-url');
        togglePreview(id, url);
    }
    function attachBuyEvents() {
        document.querySelectorAll('.buy-now-btn').forEach(btn => {
            btn.removeEventListener('click', buyHandler);
            btn.addEventListener('click', buyHandler);
        });
    }
    function buyHandler(e) {
        const btn = e.currentTarget;
        if (!currentUser) {
            alert("Please sign in first.");
            window.location.href = 'account.html';
            return;
        }
        const beatId = btn.getAttribute('data-id');
        const price = btn.getAttribute('data-price');
        const title = btn.getAttribute('data-title');
        window.location.href = `checkout.html?id=${beatId}&price=${price}&title=${encodeURIComponent(title)}`;
    }

    function togglePreview(beatId, audioUrl) {
        if (activeBeatId === beatId && activeAudio && !activeAudio.paused) { stopPreview(); return; }
        stopPreview();
        const btn = document.querySelector(`.preview-btn[data-id="${beatId}"]`);
        const prog = document.getElementById(`progress-${beatId}`);
        const time = document.getElementById(`time-${beatId}`);
        const err = document.getElementById(`error-${beatId}`);
        btn.innerHTML = '⏳ Loading...'; btn.disabled = true; err.classList.add('hidden');
        const audio = new Audio(); audio.src = audioUrl; audio.crossOrigin = "Anonymous";
        let maxDur = 30, interval;
        audio.addEventListener('loadedmetadata', () => {
            maxDur = Math.min(audio.duration,30); audio.currentTime = 0;
            audio.play().then(() => {
                btn.innerHTML = '⏸ Pause'; btn.disabled = false; btn.classList.add('playing');
                activeAudio = audio; activeBeatId = beatId;
                interval = setInterval(() => {
                    if (audio.paused) { clearInterval(interval); reset(); return; }
                    if (audio.currentTime >= maxDur) { audio.pause(); audio.currentTime = 0; clearInterval(interval); reset(); }
                    else { prog.style.width = (audio.currentTime / maxDur)*100 + '%'; const cs = Math.floor(audio.currentTime); time.textContent = `${Math.floor(cs/60)}:${(cs%60).toString().padStart(2,'0')} / 0:${Math.floor(maxDur)}`; }
                }, 200);
            }).catch(() => { btn.innerHTML = '▶ 30s Preview'; btn.disabled = false; err.textContent = '❌ Cannot play.'; err.classList.remove('hidden'); });
        });
        audio.onerror = () => { btn.innerHTML = '▶ 30s Preview'; btn.disabled = false; err.textContent = '❌ Failed to load.'; err.classList.remove('hidden'); };
        function reset() { btn.innerHTML = '▶ 30s Preview'; btn.classList.remove('playing'); prog.style.width = '0%'; time.textContent = '0:00 / 0:30'; activeAudio = null; activeBeatId = null; }
    }
    function stopPreview() { if (activeAudio) { activeAudio.pause(); activeAudio.currentTime = 0; if(activeInterval) clearInterval(activeInterval); const oldBtn = document.querySelector(`.preview-btn[data-id="${activeBeatId}"]`); if(oldBtn){ oldBtn.innerHTML='▶ 30s Preview'; oldBtn.classList.remove('playing'); } const oldProg = document.getElementById(`progress-${activeBeatId}`); if(oldProg) oldProg.style.width='0%'; const oldTime = document.getElementById(`time-${activeBeatId}`); if(oldTime) oldTime.textContent='0:00 / 0:30'; activeAudio=null; activeBeatId=null; } }
    function resetFilters() { document.getElementById('searchInput').value=''; document.getElementById('genreFilter').value=''; document.getElementById('bpmMin').value='60'; document.getElementById('bpmMax').value='180'; document.getElementById('bpmMinVal').innerText='60'; document.getElementById('bpmMaxVal').innerText='180'; applyFilters(); }
    document.getElementById('bpmMin').addEventListener('input', (e)=>{ document.getElementById('bpmMinVal').innerText=e.target.value; applyFilters(); });
    document.getElementById('bpmMax').addEventListener('input', (e)=>{ document.getElementById('bpmMaxVal').innerText=e.target.value; applyFilters(); });
    document.getElementById('searchInput').addEventListener('input', applyFilters);
    document.getElementById('genreFilter').addEventListener('change', applyFilters);
    function escapeHtml(str) { return str.replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    loadBeats();

    // Gold canvas (same as landing)
    const canvas = document.getElementById('gold-canvas');
    const ctx = canvas.getContext('2d');
    let width, height, goldBars = [], particles = [], mouseX=0, mouseY=0, targetX=0, targetY=0;
    function resizeCanvas() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
    window.addEventListener('resize', () => { resizeCanvas(); initGoldBars(); initParticles(); });
    window.addEventListener('mousemove', (e) => { targetX = e.clientX; targetY = e.clientY; mouseX = mouseX*0.95+targetX*0.05; mouseY = mouseY*0.95+targetY*0.05; });
    class GoldBar { constructor() { this.x = Math.random()*width; this.y = Math.random()*height; this.w = Math.random()*60+30; this.h = Math.random()*15+8; this.angle = Math.random()*Math.PI*2; this.rotSpeed = (Math.random()-0.5)*0.005; this.moveX = (Math.random()-0.5)*0.3; this.moveY = (Math.random()-0.5)*0.2; this.opacity = Math.random()*0.25+0.1; }
    update() { let dx = this.x - mouseX, dy = this.y - mouseY, dist = Math.hypot(dx,dy); if(dist<120){ let angle = Math.atan2(dy,dx), force = (120-dist)/120*0.8; this.x += Math.cos(angle)*force; this.y += Math.sin(angle)*force; } this.x += this.moveX; this.y += this.moveY; this.angle += this.rotSpeed; if(this.x<-100) this.x=width+100; if(this.x>width+100) this.x=-100; if(this.y<-100) this.y=height+100; if(this.y>height+100) this.y=-100; }
    draw() { ctx.save(); ctx.translate(this.x,this.y); ctx.rotate(this.angle); let grad = ctx.createLinearGradient(-this.w/2,-this.h/2,this.w/2,this.h/2); grad.addColorStop(0,`rgba(212,175,55,${this.opacity*0.8})`); grad.addColorStop(0.5,`rgba(255,215,0,${this.opacity})`); grad.addColorStop(1,`rgba(184,134,11,${this.opacity*0.7})`); ctx.fillStyle=grad; ctx.shadowBlur=12; ctx.shadowColor=`rgba(212,175,55,${this.opacity*0.6})`; ctx.fillRect(-this.w/2,-this.h/2,this.w,this.h); ctx.strokeStyle=`rgba(255,235,140,${this.opacity*0.8})`; ctx.lineWidth=1; ctx.strokeRect(-this.w/2,-this.h/2,this.w,this.h); ctx.restore(); } }
    class GoldParticle { constructor() { this.x = Math.random()*width; this.y = Math.random()*height; this.size = Math.random()*2+0.8; this.speedX = (Math.random()-0.5)*0.2; this.speedY = (Math.random()-0.5)*0.15; this.alpha = Math.random()*0.4+0.15; }
    update() { this.x += this.speedX; this.y += this.speedY; if(this.x<0) this.x=width; if(this.x>width) this.x=0; if(this.y<0) this.y=height; if(this.y>height) this.y=0; }
    draw() { ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fillStyle=`rgba(255,215,0,${this.alpha})`; ctx.fill(); } }
    function initGoldBars() { goldBars = []; let barCount = Math.min(35, Math.floor(width/80)); for(let i=0;i<barCount;i++) goldBars.push(new GoldBar()); }
    function initParticles() { particles = []; let particleCount = Math.min(200, Math.floor(width*height/12000)); for(let i=0;i<particleCount;i++) particles.push(new GoldParticle()); }
    function drawBackground() { let grad = ctx.createLinearGradient(0,0,width,height); grad.addColorStop(0,'#0a0804'); grad.addColorStop(0.5,'#1c160c'); grad.addColorStop(1,'#0d0a05'); ctx.fillStyle=grad; ctx.fillRect(0,0,width,height); let radGrad = ctx.createRadialGradient(width/2,height/2,50,width/2,height/2,width/1.2); radGrad.addColorStop(0,'rgba(212,175,55,0.05)'); radGrad.addColorStop(1,'rgba(0,0,0,0)'); ctx.fillStyle=radGrad; ctx.fillRect(0,0,width,height); }
    function animate() { if(!ctx) return; drawBackground(); for(let bar of goldBars) { bar.update(); bar.draw(); } for(let p of particles) { p.update(); p.draw(); } requestAnimationFrame(animate); }
    function startCanvas() { resizeCanvas(); initGoldBars(); initParticles(); animate(); }
    startCanvas();
</script>
</body>
</html>
